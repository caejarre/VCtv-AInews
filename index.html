<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCtv AInews</title>
<style>
  :root {
    --red:#cc0000;--dark:#0a0a0a;--card:#111;--border:#222;
    --text:#e8e8e8;--muted:#888;--gold:#f5c518;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:var(--text);font-family:'Georgia',serif;min-height:100vh;}
  header{background:linear-gradient(135deg,#0a0a0a,#1a0000,#0a0a0a);border-bottom:3px solid var(--red);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(204,0,0,.4);}
  .header-top{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;gap:16px;flex-wrap:wrap;}
  .logo{display:flex;align-items:center;gap:10px;}
  .logo-icon{background:var(--red);color:#fff;font-size:11px;font-weight:900;letter-spacing:1px;padding:4px 8px;border-radius:4px;font-family:'Arial Black',sans-serif;}
  .logo-text{font-size:22px;font-weight:900;color:#fff;font-family:'Arial Black',sans-serif;letter-spacing:2px;}
  .logo-text span{color:var(--red);}
  .edition-badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:700;font-family:Arial,sans-serif;letter-spacing:1px;}
  .badge-daily{background:#1a3a1a;color:#4caf50;border:1px solid #4caf50;}
  .badge-weekend{background:#1a1a3a;color:#6699ff;border:1px solid #6699ff;}
  .badge-special{background:#3a2a00;color:var(--gold);border:1px solid var(--gold);animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  .ticker-bar{background:var(--red);padding:6px 0;overflow:hidden;white-space:nowrap;}
  .ticker-inner{display:inline-block;animation:ticker 50s linear infinite;font-size:12px;font-family:Arial,sans-serif;font-weight:600;}
  @keyframes ticker{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}
  nav{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:#0d0d0d;}
  nav button{background:none;border:none;color:var(--muted);padding:10px 18px;cursor:pointer;font-size:13px;font-family:Arial,sans-serif;font-weight:600;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
  nav button:hover,nav button.active{color:#fff;border-bottom-color:var(--red);}
  .container{max-width:1200px;margin:0 auto;padding:24px 16px;}
  .gen-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:28px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .gen-bar input{flex:1;min-width:200px;background:#1a1a1a;border:1px solid #333;color:#fff;padding:10px 14px;border-radius:6px;font-size:14px;font-family:Georgia,serif;}
  .gen-bar input:focus{outline:none;border-color:var(--red);}
  .gen-bar button{background:var(--red);color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:700;font-family:Arial,sans-serif;font-size:13px;}
  .gen-bar button:hover{background:#aa0000;}
  .gen-bar button:disabled{background:#444;cursor:not-allowed;}
  .news-grid{display:grid;grid-template-columns:2fr 1fr;gap:24px;}
  .news-grid.weekend{grid-template-columns:1fr 1fr 1fr;}
  @media(max-width:768px){.news-grid,.news-grid.weekend{grid-template-columns:1fr;}}
  .main-col,.side-col{display:flex;flex-direction:column;gap:20px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s,transform .2s;cursor:pointer;}
  .card:hover{border-color:var(--red);transform:translateY(-2px);}
  .card-img{width:100%;height:200px;background:linear-gradient(135deg,#1a0000,#0a0a1a);display:flex;align-items:center;justify-content:center;font-size:48px;}
  .card-img.small{height:120px;font-size:32px;}
  .card-body{padding:16px;}
  .card-cat{font-size:10px;font-weight:700;color:var(--red);font-family:Arial,sans-serif;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
  .card-title{font-size:18px;font-weight:700;line-height:1.3;margin-bottom:8px;color:#fff;}
  .card-title.small{font-size:14px;}
  .card-body p{font-size:14px;color:#aaa;line-height:1.6;margin-bottom:10px;}
  .card-meta{font-size:11px;color:var(--muted);font-family:Arial,sans-serif;display:flex;gap:12px;align-items:center;}
  .card-meta .source{color:var(--red);font-weight:700;}
  .hero-card{background:linear-gradient(to bottom,#1a0505,var(--card));border:2px solid var(--red);border-radius:12px;overflow:hidden;}
  .hero-card .card-img{height:280px;font-size:64px;}
  .hero-card .card-title{font-size:24px;}
  .special-banner{background:linear-gradient(135deg,#1a1400,#2a2000);border:2px solid var(--gold);border-radius:10px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:12px;}
  .special-banner h2{color:var(--gold);font-size:18px;margin-bottom:4px;}
  .special-banner p{color:#ccc;font-size:13px;}
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;color:var(--muted);}
  .spinner{width:40px;height:40px;border:3px solid #222;border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:16px;}
  .modal-overlay.open{display:flex;}
  .modal{background:#111;border:1px solid #333;border-radius:12px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;padding:28px;}
  .modal-cat{font-size:11px;color:var(--red);font-weight:700;letter-spacing:1.5px;font-family:Arial,sans-serif;margin-bottom:8px;}
  .modal h2{font-size:22px;line-height:1.3;margin-bottom:12px;}
  .modal-meta{font-size:12px;color:var(--muted);font-family:Arial,sans-serif;margin-bottom:16px;}
  .modal-body{font-size:15px;line-height:1.8;color:#ccc;}
  .modal-body p{margin-bottom:12px;}
  .modal-close{background:none;border:1px solid #444;color:#aaa;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;margin-top:20px;float:right;}
  .modal-close:hover{background:#222;}
  .section-title{font-size:13px;font-weight:700;color:var(--red);font-family:Arial,sans-serif;letter-spacing:2px;text-transform:uppercase;border-left:3px solid var(--red);padding-left:10px;margin-bottom:16px;}
  .status-bar{font-size:11px;color:var(--muted);font-family:Arial,sans-serif;margin-bottom:12px;padding:6px 10px;background:#0d0d0d;border-radius:6px;}
  footer{border-top:1px solid var(--border);margin-top:48px;padding:20px;text-align:center;color:var(--muted);font-size:12px;font-family:Arial,sans-serif;}
  footer span{color:var(--red);}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="logo">
      <span class="logo-icon">VC</span>
      <span class="logo-text">VCtv <span>AI</span>news</span>
    </div>
    <span id="editionBadge" class="edition-badge badge-daily">EDIÇÃO DIÁRIA</span>
    <span id="dateDisplay" style="font-size:12px;color:#888;font-family:Arial,sans-serif;"></span>
  </div>
  <div class="ticker-bar"><span class="ticker-inner" id="tickerText">⚡ Carregando notícias...</span></div>
  <nav>
    <button class="active" onclick="setCategory('tudo',this)">TUDO</button>
    <button onclick="setCategory('tecnologia',this)">TECNOLOGIA</button>
    <button onclick="setCategory('mundo',this)">MUNDO</button>
    <button onclick="setCategory('ciencia',this)">CIÊNCIA</button>
    <button onclick="setCategory('economia',this)">ECONOMIA</button>
    <button onclick="setCategory('cultura',this)">CULTURA</button>
    <button onclick="setCategory('esportes',this)">ESPORTES</button>
  </nav>
</header>

<div class="container">
  <div class="gen-bar">
    <input id="topicInput" type="text" placeholder="✍️ Digite um tema e gere uma notícia... ex: Copa do Mundo 2026"/>
    <button id="genBtn" onclick="generateCustomNews()">Gerar Notícia</button>
  </div>
  <div id="specialBanner"></div>
  <div id="statusBar" class="status-bar">🔄 Buscando notícias...</div>
  <div id="newsContainer" class="loading"><div class="spinner"></div><span>Buscando notícias do dia...</span></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<footer><p><span>VCtv AInews</span> — Powered by IA · Atualizado diariamente · <span>VCtv</span> © 2025</p></footer>

<script>
// ── CONSTANTES ────────────────────────────────────────────────────────────────
const EMOJIS = {tecnologia:"💻",mundo:"🌍",ciencia:"🔬",economia:"💰",cultura:"🎭",esportes:"⚽",geral:"📰",saude:"🏥"};
const SPECIAL_DATES = {"01-01":"🎆 Feliz Ano Novo! Edição Especial","25-12":"🎄 Feliz Natal! Edição Especial","07-09":"🇧🇷 Independência do Brasil","12-10":"🎉 Dia das Crianças","02-11":"🕯️ Finados","15-11":"🇧🇷 Proclamação da República"};

// RSS via allorigins (proxy CORS grátis e confiável)
const FEEDS = [
  {url:"https://feeds.bbci.co.uk/portuguese/rss.xml", name:"BBC Brasil", cat:"mundo"},
  {url:"https://g1.globo.com/rss/g1/tecnologia/", name:"G1 Tech", cat:"tecnologia"},
  {url:"https://g1.globo.com/rss/g1/ciencia-e-saude/", name:"G1 Saúde", cat:"ciencia"},
  {url:"https://g1.globo.com/rss/g1/economia/", name:"G1 Economia", cat:"economia"},
  {url:"https://feeds.bbci.co.uk/portuguese/science/rss.xml", name:"BBC Ciência", cat:"ciencia"},
  {url:"https://techcrunch.com/feed/", name:"TechCrunch", cat:"tecnologia"},
  {url:"https://g1.globo.com/rss/g1/mundo/", name:"G1 Mundo", cat:"mundo"},
];

const now = new Date();
const todayKey = now.toDateString();
const dayOfWeek = now.getDay();
const mmdd = String(now.getDate()).padStart(2,"0")+"-"+String(now.getMonth()+1).padStart(2,"0");
const isWeekend = dayOfWeek===0||dayOfWeek===6;
const isSpecial = !!SPECIAL_DATES[mmdd];
let allNews=[], currentCategory="tudo", currentEdition="daily";

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById("dateDisplay").textContent = now.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
currentEdition = isSpecial?"special":isWeekend?"weekend":"daily";
setupBadge();
showSpecialBanner();
(async()=>{ await loadNews(); })();

function setupBadge(){
  const b=document.getElementById("editionBadge");
  if(currentEdition==="special"){b.className="edition-badge badge-special";b.textContent="✨ EDIÇÃO ESPECIAL";}
  else if(currentEdition==="weekend"){b.className="edition-badge badge-weekend";b.textContent="📅 FIM DE SEMANA";}
  else{b.className="edition-badge badge-daily";b.textContent="📰 EDIÇÃO DIÁRIA";}
}

function showSpecialBanner(){
  if(!isSpecial)return;
  document.getElementById("specialBanner").innerHTML=`<div class="special-banner"><span style="font-size:28px">✨</span><div><h2>${SPECIAL_DATES[mmdd]}</h2><p>Edição especial comemorativa com cobertura ampliada.</p></div></div>`;
}

function setStatus(msg){ document.getElementById("statusBar").textContent=msg; }

// ── RSS FETCH via allorigins ───────────────────────────────────────────────────
async function fetchFeed(feed){
  const proxy="https://api.allorigins.win/get?url="+encodeURIComponent(feed.url);
  try{
    const r=await fetch(proxy,{signal:AbortSignal.timeout(8000)});
    const j=await r.json();
    if(!j.contents) return [];
    const parser=new DOMParser();
    const xml=parser.parseFromString(j.contents,"text/xml");
    const items=[...xml.querySelectorAll("item")].slice(0,6);
    return items.map(item=>({
      title: item.querySelector("title")?.textContent?.trim()||"",
      summary: stripHtml(item.querySelector("description")?.textContent||"").slice(0,300),
      link: item.querySelector("link")?.textContent?.trim()||"",
      date: new Date(item.querySelector("pubDate")?.textContent||Date.now()),
      source: feed.name,
      category: feed.cat,
      emoji: EMOJIS[feed.cat]||"📰",
      content: null, aiIntro:null
    })).filter(n=>n.title.length>10);
  }catch(e){ return []; }
}

function stripHtml(h){ return h.replace(/<[^>]*>/g,"").replace(/&[a-zA-Z]+;/g," ").replace(/\s+/g," ").trim(); }

// ── AI via Pollinations com retry ─────────────────────────────────────────────
async function askAI(prompt, seed=42, retries=2){
  // Tenta Pollinations v2 endpoint (openai-compatible)
  for(let i=0;i<=retries;i++){
    try{
      const delay = i*2000;
      if(delay>0) await sleep(delay);
      const res=await fetch("https://text.pollinations.ai/"+encodeURIComponent(prompt)+"?model=openai-large&seed="+seed,
        {signal:AbortSignal.timeout(15000)});
      const text=await res.text();
      // Se vier erro JSON do pollinations, tenta próxima tentativa
      if(text.startsWith("{") && text.includes('"error"')){
        if(i<retries) continue;
        throw new Error("Pollinations error: "+text);
      }
      if(text && text.length>20) return text.trim();
    }catch(e){
      if(i===retries) throw e;
    }
  }
  throw new Error("AI indisponível");
}

// ── Fallback: Claude API embutido no artifact ─────────────────────────────────
async function askClaude(prompt){
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      messages:[{role:"user",content:prompt}]
    })
  });
  const d=await res.json();
  return d.content?.[0]?.text||"";
}

async function askAIWithFallback(prompt, seed=42){
  try{ return await askAI(prompt, seed); }
  catch(e){
    try{ return await askClaude(prompt); }
    catch(e2){ return null; }
  }
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ── LOAD NEWS ─────────────────────────────────────────────────────────────────
async function loadNews(){
  const cacheKey="vctv3_"+todayKey+"_"+currentEdition;
  const cached=localStorage.getItem(cacheKey);
  if(cached){
    try{
      allNews=JSON.parse(cached);
      if(allNews.length>0){ renderNews(); updateTicker(); setStatus("✅ Notícias carregadas do cache · "+allNews.length+" matérias"); return; }
    }catch(e){}
  }

  setStatus("🔄 Buscando RSS...");
  const feedsToUse = isWeekend||isSpecial ? FEEDS : FEEDS.slice(0,5);
  const results=await Promise.all(feedsToUse.map(fetchFeed));
  let raw=results.flat().filter(n=>n.title.length>10);

  // dedup
  const seen=new Set();
  raw=raw.filter(n=>{ if(seen.has(n.title)) return false; seen.add(n.title); return true; });
  raw.sort((a,b)=>b.date-a.date);
  allNews=raw.slice(0, isWeekend||isSpecial?18:12);

  if(allNews.length===0){
    setStatus("⚠️ RSS falhou — gerando notícias por IA...");
    allNews=await generateFallbackNews();
  } else {
    setStatus(`✅ ${allNews.length} notícias encontradas via RSS · Aprimorando com IA...`);
    // Enhance apenas os primeiros 3 com IA (evita rate limit)
    await enhanceTopStories(allNews.slice(0,3));
    setStatus(`✅ ${allNews.length} notícias prontas`);
  }

  try{ localStorage.setItem(cacheKey,JSON.stringify(allNews)); }catch(e){}
  renderNews();
  updateTicker();
}

async function enhanceTopStories(items){
  for(let i=0;i<items.length;i++){
    const n=items[i];
    try{
      const prompt=`Você é um jornalista da VCtv AInews. Escreva UM parágrafo introdutório de 2 frases sobre esta notícia, em português do Brasil, de forma envolvente. Título: "${n.title}". Responda APENAS com o parágrafo.`;
      const text=await askAIWithFallback(prompt, i*13);
      if(text) allNews[i].aiIntro=text.slice(0,400);
      await sleep(1500); // respeita rate limit
    }catch(e){}
  }
}

async function generateFallbackNews(){
  const prompt=`Você é redator-chefe da VCtv AInews. Data: ${now.toLocaleDateString("pt-BR")}. Gere 8 notícias importantes e variadas em JSON. Retorne APENAS um array JSON, sem markdown, sem texto extra. Formato: [{"title":"...","summary":"...","category":"tecnologia","emoji":"💻"},{"title":"...","summary":"...","category":"mundo","emoji":"🌍"},...]. Categorias possíveis: tecnologia, mundo, ciencia, economia, cultura, esportes. Sejam realistas e atuais.`;
  try{
    const text=await askAIWithFallback(prompt,77);
    if(!text) throw new Error("sem resposta");
    const clean=text.replace(/```json|```/g,"").trim();
    const start=clean.indexOf("["), end=clean.lastIndexOf("]");
    const arr=JSON.parse(clean.slice(start,end+1));
    return arr.map(n=>({...n,source:"VCtv IA",date:now,content:null,aiIntro:null}));
  }catch(e){
    // Notícias hardcoded de emergência
    return [
      {title:"Inteligência Artificial transforma o mercado de trabalho global em 2026",summary:"Relatórios indicam que mais de 40% das tarefas rotineiras já são automatizadas por IA em grandes empresas.",category:"tecnologia",emoji:"💻",source:"VCtv",date:now},
      {title:"Mudanças climáticas aceleram: temperatura global atinge novo recorde",summary:"Cientistas alertam para necessidade urgente de ação climática após dados do último trimestre.",category:"ciencia",emoji:"🔬",source:"VCtv",date:now},
      {title:"Economia brasileira apresenta crescimento acima do esperado",summary:"PIB do primeiro trimestre surpreende analistas e impulsiona confiança no mercado.",category:"economia",emoji:"💰",source:"VCtv",date:now},
      {title:"Copa do Mundo 2026: preparativos avançam nos países-sede",summary:"EUA, México e Canadá intensificam obras e logística para o maior torneio do planeta.",category:"esportes",emoji:"⚽",source:"VCtv",date:now},
    ];
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function setCategory(cat,btn){
  currentCategory=cat;
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderNews();
}

function renderNews(){
  const c=document.getElementById("newsContainer");
  let filtered=currentCategory==="tudo"?allNews:allNews.filter(n=>n.category===currentCategory);
  if(filtered.length===0){ c.innerHTML=`<div class="loading"><span>Nenhuma notícia nesta categoria hoje.</span></div>`; return; }
  c.className="";
  c.innerHTML=(currentEdition==="weekend"||currentEdition==="special")?renderWeekend(filtered):renderDaily(filtered);
}

function renderDaily(news){
  const [hero,...rest]=news;
  return `<div class="news-grid">
    <div class="main-col">${heroCard(hero)}${rest.slice(4).map(n=>smallCard(n)).join("")}</div>
    <div class="side-col">${rest.slice(0,4).map(n=>sideCard(n)).join("")}</div>
  </div>`;
}

function renderWeekend(news){
  const secs={};
  news.forEach(n=>{ if(!secs[n.category])secs[n.category]=[]; secs[n.category].push(n); });
  let cols=[[],[],[]],ci=0;
  for(const [cat,items] of Object.entries(secs)){
    let html=`<div class="section-title">${EMOJIS[cat]||"📰"} ${cat.toUpperCase()}</div>`;
    html+=items.map(n=>smallCard(n)).join("");
    cols[ci%3].push(html); ci++;
  }
  return `<div class="news-grid weekend">${cols.map(c=>`<div class="main-col">${c.join("")}</div>`).join("")}</div>`;
}

function heroCard(n){ if(!n)return""; const i=allNews.indexOf(n);
  return `<div class="card hero-card" onclick="openModal(${i})">
    <div class="card-img">${n.emoji}</div>
    <div class="card-body">
      <div class="card-cat">${(n.category||"geral").toUpperCase()}</div>
      <div class="card-title">${esc(n.title)}</div>
      <p>${esc(n.aiIntro||n.summary||"")}</p>
      <div class="card-meta"><span class="source">${n.source||""}</span><span>${fmtDate(n.date)}</span></div>
    </div></div>`; }

function smallCard(n){ const i=allNews.indexOf(n);
  return `<div class="card" onclick="openModal(${i})">
    <div class="card-body">
      <div class="card-cat">${(n.category||"geral").toUpperCase()}</div>
      <div class="card-title small">${esc(n.title)}</div>
      <p style="font-size:13px">${esc((n.aiIntro||n.summary||"").slice(0,140))}...</p>
      <div class="card-meta"><span class="source">${n.source||""}</span><span>${fmtDate(n.date)}</span></div>
    </div></div>`; }

function sideCard(n){ const i=allNews.indexOf(n);
  return `<div class="card" onclick="openModal(${i})">
    <div class="card-img small">${n.emoji}</div>
    <div class="card-body">
      <div class="card-cat">${(n.category||"geral").toUpperCase()}</div>
      <div class="card-title small">${esc(n.title)}</div>
      <div class="card-meta"><span class="source">${n.source||""}</span></div>
    </div></div>`; }

function esc(s){ return (s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtDate(d){ try{return new Date(d).toLocaleDateString("pt-BR");}catch{return"";} }

// ── MODAL ─────────────────────────────────────────────────────────────────────
async function openModal(idx){
  const n=allNews[idx]; if(!n)return;
  const ov=document.getElementById("modalOverlay");
  const mc=document.getElementById("modalContent");
  mc.innerHTML=`<div class="modal-cat">${n.emoji} ${(n.category||"geral").toUpperCase()}</div>
    <h2>${esc(n.title)}</h2>
    <div class="modal-meta">${n.source||""} · ${fmtDate(n.date)}</div>
    <div class="modal-body"><div class="spinner" style="margin:20px auto"></div><p style="text-align:center;margin-top:12px">Gerando artigo completo...</p></div>
    <button class="modal-close" onclick="closeModal()">Fechar</button>`;
  ov.classList.add("open");

  if(!n.content){
    try{
      const prompt=`Você é um jornalista sênior da VCtv AInews. Escreva um artigo jornalístico completo em português do Brasil sobre: "${n.title}". Contexto adicional: ${n.summary||""}. Escreva exatamente 4 parágrafos separados por linha em branco. Tom profissional, informativo e envolvente. NÃO use markdown, apenas texto puro.`;
      const text=await askAIWithFallback(prompt,idx*7);
      n.content=text||n.summary||"Conteúdo indisponível.";
    }catch(e){ n.content=n.summary||"Conteúdo indisponível."; }
  }

  const paras=n.content.split(/\n+/).filter(p=>p.trim()).map(p=>`<p>${esc(p)}</p>`).join("");
  mc.innerHTML=`<div class="modal-cat">${n.emoji} ${(n.category||"geral").toUpperCase()}</div>
    <h2>${esc(n.title)}</h2>
    <div class="modal-meta">${n.source||""} · ${fmtDate(n.date)}${n.link?` · <a href="${n.link}" target="_blank" style="color:var(--red)">Fonte original ↗</a>`:""}</div>
    <div class="modal-body">${paras}</div>
    <button class="modal-close" onclick="closeModal()">Fechar</button>`;
}

function closeModal(e){
  if(!e||e.target===document.getElementById("modalOverlay"))
    document.getElementById("modalOverlay").classList.remove("open");
}

// ── CUSTOM NEWS ───────────────────────────────────────────────────────────────
async function generateCustomNews(){
  const topic=document.getElementById("topicInput").value.trim();
  if(!topic) return;
  const btn=document.getElementById("genBtn");
  btn.disabled=true; btn.textContent="Gerando...";
  try{
    const prompt=`Você é um jornalista da VCtv AInews. Crie uma notícia jornalística completa em português do Brasil sobre o tema: "${topic}". Retorne APENAS um JSON no formato: {"title":"...","summary":"...","category":"tecnologia","emoji":"💻","content":"parágrafo1\\n\\nparágrafo2\\n\\nparágrafo3\\n\\nparágrafo4"}. O content deve ter 4 parágrafos ricos e informativos.`;
    const text=await askAIWithFallback(prompt,Date.now()%9999);
    if(!text) throw new Error("sem resposta");
    const clean=text.replace(/```json|```/g,"").trim();
    const start=clean.indexOf("{"),end=clean.lastIndexOf("}");
    const n=JSON.parse(clean.slice(start,end+1));
    n.source="VCtv IA · Gerado agora";
    n.date=new Date();
    allNews.unshift(n);
    renderNews();
    openModal(0);
  }catch(e){
    alert("Não foi possível gerar a notícia. Tente um tema mais específico.");
  }
  btn.disabled=false; btn.textContent="Gerar Notícia";
  document.getElementById("topicInput").value="";
}

function updateTicker(){
  const titles=allNews.slice(0,8).map(n=>`${n.emoji} ${n.title}`).join("  ·  ");
  document.getElementById("tickerText").textContent=titles||"VCtv AInews — Notícias do dia";
}
</script>
