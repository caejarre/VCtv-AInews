<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VCtv AInews</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0a;
  --card:#121212;
  --red:#cc0000;
  --text:#e5e5e5;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
}

/* HEADER */
header{
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:2px solid var(--red);
}

header h1{
  font-family:'Playfair Display';
  font-size:22px;
}

/* LIST */
.feed{
  max-width:700px;
  margin:auto;
}

/* CARD */
.card{
  background:var(--card);
  margin:10px;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:.2s;
}

.card:hover{transform:scale(1.02);}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{
  padding:12px;
}

.card h2{
  font-size:18px;
}

.meta{
  font-size:12px;
  color:#888;
}

/* SKELETON */
.skeleton{
  height:220px;
  margin:10px;
  border-radius:10px;
  background:linear-gradient(90deg,#222,#333,#222);
  animation:load 1.2s infinite;
}

@keyframes load{
  0%{opacity:.6}
  50%{opacity:1}
  100%{opacity:.6}
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#000d;
  display:none;
}

.modal.open{display:block;}

.modal-content{
  background:#111;
  max-width:700px;
  margin:40px auto;
  padding:20px;
}

</style>
</head>

<body>

<header>
  <h1>VCtv AInews</h1>
  <button onclick="loadNews()">Atualizar</button>
</header>

<div id="feed" class="feed"></div>

<div id="modal" class="modal" onclick="closeModal(event)">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
const FEEDS=[
 "https://g1.globo.com/rss/g1/",
 "https://feeds.bbci.co.uk/portuguese/rss.xml"
];

const PROXY=url=>`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

let news=[];
let page=0;

// FETCH
async function fetchRSS(url){
 try{
  let r=await fetch(PROXY(url));
  let j=await r.json();
  let xml=new DOMParser().parseFromString(j.contents,"text/xml");
  return xml;
 }catch{return null;}
}

// LOAD
async function loadNews(){
 const feed=document.getElementById("feed");
 feed.innerHTML='<div class="skeleton"></div>'.repeat(5);

 news=[];

 for(let f of FEEDS){
  let xml=await fetchRSS(f);
  if(!xml) continue;

  let items=xml.querySelectorAll("item");

  items.forEach(item=>{
    news.push({
      title:item.querySelector("title").textContent,
      date:item.querySelector("pubDate")?.textContent,
      img:"https://picsum.photos/600/400?random="+Math.random(),
      content:null
    });
  });
 }

 renderMore();
}

// RENDER SCROLL
function renderMore(){
 const feed=document.getElementById("feed");

 const chunk=news.slice(page,page+6);

 chunk.forEach((n,i)=>{
  let card=document.createElement("div");
  card.className="card";
  card.onclick=()=>openArticle(page+i);

  card.innerHTML=`
    <img src="${n.img}">
    <div class="card-content">
      <h2>${n.title}</h2>
      <div class="meta">${n.date||""}</div>
    </div>
  `;

  feed.appendChild(card);
 });

 page+=6;
}

// IA
async function generateAI(title){
 const prompt=`Escreva uma notícia jornalística completa com mínimo de 20 linhas sobre: ${title}`;
 const res=await fetch("https://text.pollinations.ai/"+encodeURIComponent(prompt));
 return await res.text();
}

// MODAL
async function openArticle(i){
 const n=news[i];
 const modal=document.getElementById("modal");
 const content=document.getElementById("modalContent");

 modal.classList.add("open");

 content.innerHTML=`<h2>${n.title}</h2><p>Gerando...</p>`;

 if(!n.content){
  n.content=await generateAI(n.title);
 }

 content.innerHTML=`<h2>${n.title}</h2><p>${n.content}</p>`;
}

function closeModal(e){
 if(e.target.id==="modal"){
  document.getElementById("modal").classList.remove("open");
 }
}

// SCROLL INFINITO
window.addEventListener("scroll",()=>{
 if(window.innerHeight+window.scrollY>=document.body.offsetHeight-100){
  renderMore();
 }
});

loadNews();
</script>

</body>
</html>
