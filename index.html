<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCtv AInews</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@400;600;700&display=swap');

  :root {
    --red:#cc0000; --dark:#080808; --card:#111113; --border:#242424;
    --text:#e5e5e5; --muted:#777; --gold:#f0b429; --accent:#1a1a1a;
    --serif:'Playfair Display',Georgia,serif;
    --body:'Source Serif 4',Georgia,serif;
    --sans:'DM Sans',Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:var(--text);font-family:var(--body);min-height:100vh;}

  /* ── HEADER ── */
  header{background:#0a0a0a;border-bottom:3px solid var(--red);position:sticky;top:0;z-index:100;box-shadow:0 2px 30px rgba(204,0,0,.35);}
  .header-top{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;gap:12px;flex-wrap:wrap;border-bottom:1px solid #1e1e1e;}
  .logo{display:flex;align-items:center;gap:10px;}
  .logo-icon{background:var(--red);color:#fff;font-size:10px;font-weight:900;letter-spacing:1px;padding:4px 7px;border-radius:3px;font-family:var(--sans);}
  .logo-text{font-size:21px;font-weight:900;color:#fff;font-family:var(--sans);letter-spacing:2px;}
  .logo-text span{color:var(--red);}
  .header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .edition-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;font-family:var(--sans);letter-spacing:1px;}
  .badge-daily{background:#1a2e1a;color:#5cb85c;border:1px solid #5cb85c;}
  .badge-weekend{background:#1a1a2e;color:#6699ff;border:1px solid #6699ff;}
  .badge-special{background:#2e2400;color:var(--gold);border:1px solid var(--gold);animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  #dateDisplay{font-size:11px;color:#666;font-family:var(--sans);}

  /* ── MODEL SELECTOR ── */
  .model-selector{display:flex;align-items:center;gap:6px;padding:7px 20px;background:#0d0d0d;border-bottom:1px solid #1a1a1a;flex-wrap:wrap;}
  .model-label{font-size:10px;color:#555;font-family:var(--sans);font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .model-btn{background:none;border:1px solid #2a2a2a;color:#666;font-size:11px;font-family:var(--sans);font-weight:600;padding:3px 11px;border-radius:20px;cursor:pointer;transition:all .2s;}
  .model-btn:hover{border-color:#444;color:#aaa;}
  .model-btn.active{background:var(--red);border-color:var(--red);color:#fff;}
  .model-sep{color:#333;font-size:12px;}

  /* ── TICKER ── */
  .ticker-bar{background:var(--red);padding:5px 0;overflow:hidden;white-space:nowrap;}
  .ticker-inner{display:inline-block;animation:ticker 60s linear infinite;font-size:11px;font-family:var(--sans);font-weight:600;}
  @keyframes ticker{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}

  /* ── NAV ── */
  nav{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:#0c0c0c;scrollbar-width:none;}
  nav::-webkit-scrollbar{display:none;}
  nav button{background:none;border:none;color:var(--muted);padding:9px 16px;cursor:pointer;font-size:11px;font-family:var(--sans);font-weight:700;letter-spacing:1px;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;text-transform:uppercase;}
  nav button:hover,nav button.active{color:#fff;border-bottom-color:var(--red);}

  /* ── LAYOUT ── */
  .container{max-width:1280px;margin:0 auto;padding:20px 16px;}

  /* ── GEN BAR ── */
  .gen-bar{display:flex;gap:10px;align-items:center;margin-bottom:24px;flex-wrap:wrap;}
  .gen-bar input{flex:1;min-width:220px;background:#151515;border:1px solid #2a2a2a;color:#ddd;padding:10px 14px;border-radius:6px;font-size:13px;font-family:var(--body);}
  .gen-bar input:focus{outline:none;border-color:var(--red);}
  .gen-bar input::placeholder{color:#444;}
  .gen-bar button{background:var(--red);color:#fff;border:none;padding:10px 18px;border-radius:6px;cursor:pointer;font-weight:700;font-family:var(--sans);font-size:12px;letter-spacing:.5px;transition:background .2s;}
  .gen-bar button:hover{background:#aa0000;}
  .gen-bar button:disabled{background:#333;cursor:not-allowed;}

  /* ── STATUS ── */
  .status-bar{font-size:11px;color:var(--muted);font-family:var(--sans);margin-bottom:16px;padding:5px 10px;background:#0d0d0d;border-radius:5px;border-left:3px solid var(--red);}

  /* ── SPECIAL BANNER ── */
  .special-banner{background:linear-gradient(135deg,#1a1400,#2a2000);border:2px solid var(--gold);border-radius:8px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;}
  .special-banner h2{color:var(--gold);font-size:16px;font-family:var(--serif);margin-bottom:3px;}
  .special-banner p{color:#aaa;font-size:12px;font-family:var(--sans);}

  /* ── NEWSPAPER GRID ── */
  .paper-date-line{border-top:2px solid #fff;border-bottom:1px solid #fff;padding:4px 0;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
  .paper-date-line span{font-size:10px;font-family:var(--sans);color:#888;letter-spacing:1px;text-transform:uppercase;}

  /* Main newspaper layout */
  .news-main-grid{display:grid;grid-template-columns:1.8fr 1px 1fr;gap:0;margin-bottom:32px;}
  .col-divider{background:#2a2a2a;margin:0 20px;}
  @media(max-width:768px){.news-main-grid{grid-template-columns:1fr;}.col-divider{display:none;}.side-section{border-top:1px solid #2a2a2a;padding-top:20px;}}

  /* Hero story */
  .hero-story{padding-right:0;}
  .hero-story .story-cat{font-size:10px;font-weight:700;color:var(--red);font-family:var(--sans);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
  .hero-story .story-title{font-family:var(--serif);font-size:32px;font-weight:900;line-height:1.2;color:#fff;margin-bottom:12px;border-bottom:2px solid var(--red);padding-bottom:10px;}
  .hero-story .story-byline{font-size:11px;color:var(--muted);font-family:var(--sans);margin-bottom:14px;}
  .hero-story .story-body{font-size:15px;line-height:1.8;color:#c8c8c8;font-family:var(--body);}
  .hero-story .story-body p{margin-bottom:10px;}
  .hero-story .read-more{font-size:12px;color:var(--red);font-family:var(--sans);font-weight:700;cursor:pointer;margin-top:12px;display:inline-block;letter-spacing:.5px;}
  .hero-story .read-more:hover{text-decoration:underline;}

  /* Side section */
  .side-section{padding-left:0;}
  .section-label{font-size:10px;font-weight:700;color:#888;font-family:var(--sans);letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid #222;padding-bottom:6px;margin-bottom:14px;}

  /* Side story items */
  .side-story{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid #1e1e1e;cursor:pointer;transition:opacity .2s;}
  .side-story:last-child{border-bottom:none;}
  .side-story:hover{opacity:.8;}
  .side-story .story-num{font-size:28px;font-family:var(--serif);font-weight:900;color:#2a2a2a;line-height:1;min-width:36px;}
  .side-story .story-info .cat{font-size:9px;font-weight:700;color:var(--red);font-family:var(--sans);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
  .side-story .story-info .title{font-size:14px;font-weight:700;font-family:var(--serif);color:#ddd;line-height:1.3;margin-bottom:6px;}
  .side-story .story-info .excerpt{font-size:12px;color:#888;font-family:var(--body);line-height:1.5;}
  .side-story .story-info .meta{font-size:10px;color:#555;font-family:var(--sans);margin-top:5px;}

  /* ── SECTION DIVIDER ── */
  .section-divider{display:flex;align-items:center;gap:12px;margin:28px 0 20px;}
  .section-divider .sdlabel{font-size:11px;font-weight:700;color:var(--red);font-family:var(--sans);letter-spacing:2px;text-transform:uppercase;white-space:nowrap;}
  .section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:#222;}

  /* ── CARD GRID (3 col) ── */
  .cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#1e1e1e;border:1px solid #1e1e1e;border-radius:8px;overflow:hidden;margin-bottom:28px;}
  @media(max-width:900px){.cards-grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:580px){.cards-grid{grid-template-columns:1fr;}}

  .news-card{background:var(--card);padding:18px;cursor:pointer;transition:background .2s;display:flex;flex-direction:column;gap:8px;}
  .news-card:hover{background:#181818;}
  .news-card .card-cat{font-size:9px;font-weight:700;color:var(--red);font-family:var(--sans);letter-spacing:2px;text-transform:uppercase;}
  .news-card .card-title{font-size:16px;font-weight:700;font-family:var(--serif);color:#e0e0e0;line-height:1.35;}
  .news-card .card-excerpt{font-size:13px;color:#999;font-family:var(--body);line-height:1.65;flex:1;}
  .news-card .card-meta{font-size:10px;color:#555;font-family:var(--sans);display:flex;justify-content:space-between;align-items:center;border-top:1px solid #1e1e1e;padding-top:8px;}
  .news-card .card-meta .source{color:#666;font-weight:600;}

  /* ── WEEKEND / SPECIAL GRID ── */
  .weekend-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;}
  @media(max-width:900px){.weekend-grid{grid-template-columns:1fr 1fr;}}
  @media(max-width:580px){.weekend-grid{grid-template-columns:1fr;}}
  .weekend-col .wk-section-title{font-size:10px;font-weight:700;color:var(--red);font-family:var(--sans);letter-spacing:2px;text-transform:uppercase;border-bottom:2px solid var(--red);padding-bottom:6px;margin-bottom:14px;}
  .wk-card{padding:12px 0;border-bottom:1px solid #1e1e1e;cursor:pointer;transition:opacity .2s;}
  .wk-card:hover{opacity:.75;}
  .wk-card:last-child{border-bottom:none;}
  .wk-card .cat{font-size:9px;color:var(--red);font-family:var(--sans);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
  .wk-card .ttl{font-size:15px;font-family:var(--serif);font-weight:700;color:#ddd;line-height:1.3;margin-bottom:6px;}
  .wk-card .exc{font-size:12px;color:#888;font-family:var(--body);line-height:1.55;}
  .wk-card .mt{font-size:10px;color:#555;font-family:var(--sans);margin-top:5px;}

  /* ── MODAL ── */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
  .modal-overlay.open{display:flex;}
  .modal{background:#0f0f0f;border:1px solid #2a2a2a;border-radius:10px;max-width:720px;width:100%;margin:auto;padding:36px;}
  .modal-cat{font-size:10px;color:var(--red);font-weight:700;letter-spacing:2px;font-family:var(--sans);text-transform:uppercase;margin-bottom:10px;}
  .modal h2{font-family:var(--serif);font-size:26px;font-weight:900;line-height:1.25;margin-bottom:10px;color:#fff;}
  .modal-meta{font-size:11px;color:var(--muted);font-family:var(--sans);margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #222;}
  .modal-meta a{color:var(--red);}
  .modal-body{font-size:15px;line-height:1.85;color:#bbb;font-family:var(--body);}
  .modal-body p{margin-bottom:14px;}
  .modal-actions{margin-top:24px;display:flex;justify-content:flex-end;gap:10px;}
  .modal-close{background:none;border:1px solid #333;color:#888;padding:8px 18px;border-radius:5px;cursor:pointer;font-size:12px;font-family:var(--sans);}
  .modal-close:hover{background:#1a1a1a;color:#ccc;}

  /* ── LOADING ── */
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;color:var(--muted);}
  .spinner{width:36px;height:36px;border:3px solid #1e1e1e;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .modal-spinner{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:14px;font-family:var(--sans);padding:20px 0;}
  .modal-spinner .spinner{width:20px;height:20px;border-width:2px;}

  /* ── FOOTER ── */
  footer{border-top:1px solid #1a1a1a;margin-top:48px;padding:20px;text-align:center;color:#444;font-size:11px;font-family:var(--sans);}
  footer span{color:var(--red);}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <span class="logo-icon">VC</span>
      <span class="logo-text">VCtv <span>AI</span>news</span>
    </div>
    <div class="header-right">
      <span id="editionBadge" class="edition-badge badge-daily">EDIÇÃO DIÁRIA</span>
      <span id="dateDisplay"></span>
    </div>
  </div>

  <!-- Model Selector -->
  <div class="model-selector">
    <span class="model-label">Modelo IA:</span>
    <button class="model-btn" data-model="openai" onclick="setModel(this)">⚡ Haiku</button>
    <button class="model-btn active" data-model="openai-large" onclick="setModel(this)">✦ Sonnet</button>
    <button class="model-btn" data-model="mistral-large" onclick="setModel(this)">◈ Opus</button>
    <button class="model-btn" data-model="openai-large&system=Você é um jornalista especialista. Escreva de forma extremamente detalhada e completa." data-extended="true" onclick="setModel(this)">⊞ Extendido</button>
    <span class="model-sep">|</span>
    <span style="font-size:10px;color:#444;font-family:var(--sans);">Haiku=rápido · Sonnet=equilibrado · Opus=detalhado · Extendido=artigo longo</span>
  </div>

  <div class="ticker-bar"><span class="ticker-inner" id="tickerText">⚡ VCtv AInews carregando...</span></div>

  <nav>
    <button class="active" onclick="setCategory('tudo',this)">TUDO</button>
    <button onclick="setCategory('tecnologia',this)">TECNOLOGIA</button>
    <button onclick="setCategory('mundo',this)">MUNDO</button>
    <button onclick="setCategory('ciencia',this)">CIÊNCIA</button>
    <button onclick="setCategory('economia',this)">ECONOMIA</button>
    <button onclick="setCategory('cultura',this)">CULTURA</button>
    <button onclick="setCategory('esportes',this)">ESPORTES</button>
  </nav>
</header>

<div class="container">
  <div class="gen-bar">
    <input id="topicInput" type="text" placeholder="✍️ Gere uma notícia sobre qualquer tema... ex: Copa do Mundo 2026"/>
    <button id="genBtn" onclick="generateCustomNews()">📰 Gerar Notícia</button>
  </div>
  <div id="specialBanner"></div>
  <div id="statusBar" class="status-bar">🔄 Buscando notícias do dia...</div>
  <div id="newsContainer" class="loading"><div class="spinner"></div><span>Carregando RSS...</span></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalBg(event)">
  <div class="modal" id="modalContent"></div>
</div>

<footer><p><span>VCtv AInews</span> — Powered by IA · Atualizado diariamente · <span>VCtv News</span> © 2025</p></footer>

<script>
// ── CONSTANTES ────────────────────────────────────────────────────────────────
const EMOJIS = {tecnologia:"💻",mundo:"🌍",ciencia:"🔬",economia:"💰",cultura:"🎭",esportes:"⚽",geral:"📰",saude:"🏥"};
const SPECIAL_DATES = {
  "01-01":"🎆 Feliz Ano Novo! Edição Especial",
  "25-12":"🎄 Feliz Natal! Edição Especial",
  "07-09":"🇧🇷 Independência do Brasil",
  "12-10":"🎉 Dia das Crianças",
  "02-11":"🕯️ Finados",
  "15-11":"🇧🇷 Proclamação da República",
  "01-05":"👷 Dia do Trabalhador"
};

const FEEDS = [
  {url:"https://feeds.bbci.co.uk/portuguese/rss.xml",           name:"BBC Brasil",    cat:"mundo"},
  {url:"https://g1.globo.com/rss/g1/tecnologia/",               name:"G1 Tecnologia", cat:"tecnologia"},
  {url:"https://g1.globo.com/rss/g1/ciencia-e-saude/",          name:"G1 Ciência",    cat:"ciencia"},
  {url:"https://g1.globo.com/rss/g1/economia/",                 name:"G1 Economia",   cat:"economia"},
  {url:"https://feeds.bbci.co.uk/portuguese/science/rss.xml",   name:"BBC Ciência",   cat:"ciencia"},
  {url:"https://g1.globo.com/rss/g1/mundo/",                    name:"G1 Mundo",      cat:"mundo"},
  {url:"https://g1.globo.com/rss/g1/esportes/",                 name:"G1 Esportes",   cat:"esportes"},
  {url:"https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml", name:"NYT Tech", cat:"tecnologia"},
];

const PROXIES = [
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

const now = new Date();
const todayKey = now.toDateString();
const dayOfWeek = now.getDay();
const mmdd = String(now.getDate()).padStart(2,"0")+"-"+String(now.getMonth()+1).padStart(2,"0");
const isWeekend = dayOfWeek===0||dayOfWeek===6;
const isSpecial = !!SPECIAL_DATES[mmdd];
let allNews = [], currentCategory = "tudo", currentEdition = "daily";
let selectedModel = "openai-large";

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById("dateDisplay").textContent =
  now.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
currentEdition = isSpecial ? "special" : isWeekend ? "weekend" : "daily";
setupBadge();
showSpecialBanner();
(async()=>{ await loadNews(); })();

function setModel(btn){
  document.querySelectorAll(".model-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  selectedModel = btn.dataset.model;
}

function setupBadge(){
  const b = document.getElementById("editionBadge");
  if(currentEdition==="special"){b.className="edition-badge badge-special";b.textContent="✨ EDIÇÃO ESPECIAL";}
  else if(currentEdition==="weekend"){b.className="edition-badge badge-weekend";b.textContent="📅 FIM DE SEMANA";}
  else{b.className="edition-badge badge-daily";b.textContent="📰 EDIÇÃO DIÁRIA";}
}
function showSpecialBanner(){
  if(!isSpecial)return;
  document.getElementById("specialBanner").innerHTML=`<div class="special-banner"><span style="font-size:26px">✨</span><div><h2>${SPECIAL_DATES[mmdd]}</h2><p>Edição especial comemorativa com cobertura ampliada.</p></div></div>`;
}
function setStatus(msg){ document.getElementById("statusBar").textContent=msg; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function stripHtml(h){ return h.replace(/<[^>]*>/g,"").replace(/&[a-zA-Z#\d]+;/g," ").replace(/\s+/g," ").trim(); }
function esc(s){ return (s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtDate(d){ try{return new Date(d).toLocaleDateString("pt-BR",{day:"2-digit",month:"short"});}catch{return"";} }

// ── RSS FETCH (dual proxy, sem IA no carregamento) ─────────────────────────────
async function fetchFeedWithProxy(feed, proxyFn){
  const proxyUrl = proxyFn(feed.url);
  const r = await fetch(proxyUrl, {signal:AbortSignal.timeout(9000)});
  let contents;
  try{
    const j = await r.json();
    contents = j.contents || j.data || null;
  }catch{
    contents = await r.text();
  }
  if(!contents) return [];
  const parser = new DOMParser();
  const xml = parser.parseFromString(contents,"text/xml");
  if(xml.querySelector("parsererror")) return [];
  const items = [...xml.querySelectorAll("item")].slice(0,5);
  return items.map(item=>{
    const raw = stripHtml(item.querySelector("description")?.textContent||"");
    return {
      title: stripHtml(item.querySelector("title")?.textContent||""),
      summary: raw.slice(0,450),
      link: item.querySelector("link")?.textContent?.trim()||"",
      date: new Date(item.querySelector("pubDate")?.textContent||Date.now()),
      source: feed.name,
      category: feed.cat,
      emoji: EMOJIS[feed.cat]||"📰",
      content: null
    };
  }).filter(n=>n.title.length>10);
}

async function fetchFeed(feed){
  for(const proxyFn of PROXIES){
    try{
      const items = await fetchFeedWithProxy(feed, proxyFn);
      if(items.length>0) return items;
    }catch(e){}
  }
  return [];
}

// ── AI (Pollinations) ─────────────────────────────────────────────────────────
async function askAI(prompt, seed=42, retries=2){
  const model = selectedModel.split("&")[0]; // limpa parâmetros extras
  for(let i=0;i<=retries;i++){
    if(i>0) await sleep(i*1500);
    try{
      const url = `https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=${model}&seed=${seed}&nologo=true`;
      const res = await fetch(url,{signal:AbortSignal.timeout(20000)});
      const text = await res.text();
      if(text&&text.length>20&&!text.includes('"error"')) return text.trim();
    }catch(e){
      if(i===retries) throw e;
    }
  }
  throw new Error("AI indisponível");
}

// ── LOAD NEWS (rápido: sem IA no carregamento) ────────────────────────────────
async function loadNews(){
  const cacheKey = "vctv4_"+todayKey+"_"+currentEdition;
  const cached = localStorage.getItem(cacheKey);
  if(cached){
    try{
      allNews = JSON.parse(cached);
      if(allNews.length>0){
        renderNews(); updateTicker();
        setStatus(`✅ ${allNews.length} notícias carregadas (cache) · Clique para ler artigo completo com IA`);
        return;
      }
    }catch(e){}
  }

  setStatus("🔄 Buscando RSS dos portais...");
  const limit = isWeekend||isSpecial ? FEEDS : FEEDS.slice(0,6);
  const results = await Promise.allSettled(limit.map(fetchFeed));
  let raw = results.flatMap(r=>r.status==="fulfilled"?r.value:[]);

  // dedup por título
  const seen = new Set();
  raw = raw.filter(n=>{ const k=n.title.slice(0,60); if(seen.has(k))return false; seen.add(k); return true; });
  raw.sort((a,b)=>b.date-a.date);
  allNews = raw.slice(0, isWeekend||isSpecial?20:14);

  if(allNews.length===0){
    setStatus("⚠️ RSS indisponível — gerando notícias por IA...");
    allNews = await generateFallbackNews();
  } else {
    setStatus(`✅ ${allNews.length} notícias carregadas · Clique em qualquer notícia para artigo completo com IA`);
  }

  try{ localStorage.setItem(cacheKey,JSON.stringify(allNews)); }catch(e){}
  renderNews();
  updateTicker();
}

async function generateFallbackNews(){
  const prompt = `Você é redator-chefe da VCtv AInews. Data: ${now.toLocaleDateString("pt-BR")}. Gere 10 notícias importantes e variadas. Retorne APENAS um array JSON sem markdown. Formato: [{"title":"...","summary":"Resumo detalhado com 3 frases completas sobre o assunto...","category":"tecnologia","emoji":"💻"},...]. Categorias: tecnologia, mundo, ciencia, economia, cultura, esportes. Notícias realistas e atuais.`;
  try{
    const text = await askAI(prompt,77);
    const clean = text.replace(/```json|```/g,"").trim();
    const s=clean.indexOf("["),e=clean.lastIndexOf("]");
    const arr = JSON.parse(clean.slice(s,e+1));
    return arr.map(n=>({...n,source:"VCtv IA",date:now,content:null}));
  }catch(e){
    return [
      {title:"Inteligência Artificial transforma o mercado de trabalho global",summary:"Relatórios de consultorias globais indicam que mais de 40% das tarefas rotineiras já são automatizadas por sistemas de IA em grandes corporações. Especialistas debatem o impacto social e econômico da transformação digital acelerada.",category:"tecnologia",emoji:"💻",source:"VCtv",date:now,content:null},
      {title:"Mudanças climáticas: temperatura global atinge novo recorde histórico",summary:"Cientistas do IPCC alertam para a necessidade urgente de ação climática após dados do último trimestre apontarem recordes de temperatura em todos os continentes. Conferências de cúpula devem ser convocadas.",category:"ciencia",emoji:"🔬",source:"VCtv",date:now,content:null},
      {title:"Economia brasileira surpreende analistas com crescimento acima do esperado",summary:"O PIB do primeiro trimestre registrou expansão superior às projeções do mercado financeiro, impulsionado pelo agronegócio e pelo setor de serviços. Confiança do consumidor atinge patamar mais alto do ano.",category:"economia",emoji:"💰",source:"VCtv",date:now,content:null},
      {title:"Copa do Mundo 2026: preparativos avançam nos três países-sede",summary:"EUA, México e Canadá intensificam as obras de infraestrutura e logística para o maior torneio de futebol do planeta. Seleção brasileira treina com foco total na conquista do hexacampeonato.",category:"esportes",emoji:"⚽",source:"VCtv",date:now,content:null},
    ];
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function setCategory(cat,btn){
  currentCategory=cat;
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderNews();
}

function renderNews(){
  const c = document.getElementById("newsContainer");
  let filtered = currentCategory==="tudo" ? allNews : allNews.filter(n=>n.category===currentCategory);
  if(filtered.length===0){
    c.innerHTML=`<div class="loading"><span>Nenhuma notícia nesta categoria hoje.</span></div>`;
    return;
  }
  c.className="";
  if(currentEdition==="weekend"||currentEdition==="special"){
    c.innerHTML = renderWeekend(filtered);
  } else {
    c.innerHTML = renderDaily(filtered);
  }
}

function renderDaily(news){
  const [hero,...rest] = news;
  const heroIdx = allNews.indexOf(hero);
  const gridItems = rest.slice(0, Math.min(rest.length, 9));
  const sideItems = rest.slice(0,4);

  // Hero em estilo editorial
  const heroHtml = `
  <div class="paper-date-line">
    <span>${now.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</span>
    <span>VCtv AInews · Edição ${currentEdition==="special"?"Especial":"Diária"}</span>
  </div>
  <div class="news-main-grid">
    <div class="hero-story" onclick="openModal(${heroIdx})" style="cursor:pointer;">
      <div class="story-cat">${EMOJIS[hero.category]||"📰"} ${(hero.category||"geral").toUpperCase()}</div>
      <div class="story-title">${esc(hero.title)}</div>
      <div class="story-byline">${esc(hero.source)} · ${fmtDate(hero.date)}</div>
      <div class="story-body">
        ${esc(hero.summary).split(". ").filter(Boolean).map(s=>`<p>${s.trim()}${s.endsWith(".")?"":" ."}</p>`).join("")}
      </div>
      <span class="read-more">Ler artigo completo com IA →</span>
    </div>
    <div class="col-divider"></div>
    <div class="side-section">
      <div class="section-label">Outras notícias</div>
      ${sideItems.map((n,i)=>{
        const idx=allNews.indexOf(n);
        return `<div class="side-story" onclick="openModal(${idx})">
          <div class="story-num">0${i+1}</div>
          <div class="story-info">
            <div class="cat">${EMOJIS[n.category]||"📰"} ${(n.category||"geral").toUpperCase()}</div>
            <div class="title">${esc(n.title)}</div>
            <div class="excerpt">${esc(n.summary.slice(0,140))}…</div>
            <div class="meta">${esc(n.source)} · ${fmtDate(n.date)}</div>
          </div>
        </div>`;
      }).join("")}
    </div>
  </div>`;

  // Cards do restante
  const remaining = rest.slice(4);
  let cardsHtml = "";
  if(remaining.length>0){
    cardsHtml = `
    <div class="section-divider"><span class="sdlabel">📰 Mais Notícias</span></div>
    <div class="cards-grid">
      ${remaining.map(n=>{
        const idx=allNews.indexOf(n);
        return `<div class="news-card" onclick="openModal(${idx})">
          <div class="card-cat">${EMOJIS[n.category]||"📰"} ${(n.category||"geral").toUpperCase()}</div>
          <div class="card-title">${esc(n.title)}</div>
          <div class="card-excerpt">${esc(n.summary.slice(0,200))}…</div>
          <div class="card-meta">
            <span class="source">${esc(n.source)}</span>
            <span>${fmtDate(n.date)}</span>
          </div>
        </div>`;
      }).join("")}
    </div>`;
  }

  return heroHtml + cardsHtml;
}

function renderWeekend(news){
  const bycat = {};
  news.forEach(n=>{ if(!bycat[n.category])bycat[n.category]=[]; bycat[n.category].push(n); });
  const cats = Object.keys(bycat);
  const cols = [[],[],[]];
  cats.forEach((c,i)=>cols[i%3].push(c));

  return `
  <div class="paper-date-line">
    <span>${now.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</span>
    <span>VCtv AInews · ${currentEdition==="special"?"Edição Especial":"Fim de Semana"}</span>
  </div>
  <div class="weekend-grid">
    ${cols.map(colCats=>`
      <div class="weekend-col">
        ${colCats.map(cat=>`
          <div class="wk-section-title">${EMOJIS[cat]||"📰"} ${cat.toUpperCase()}</div>
          ${bycat[cat].map(n=>{
            const idx=allNews.indexOf(n);
            return `<div class="wk-card" onclick="openModal(${idx})">
              <div class="ttl">${esc(n.title)}</div>
              <div class="exc">${esc(n.summary.slice(0,180))}…</div>
              <div class="mt">${esc(n.source)} · ${fmtDate(n.date)}</div>
            </div>`;
          }).join("")}
        `).join("")}
      </div>
    `).join("")}
  </div>`;
}

// ── MODAL (gera artigo com IA só ao abrir) ────────────────────────────────────
async function openModal(idx){
  const n = allNews[idx]; if(!n) return;
  const ov = document.getElementById("modalOverlay");
  const mc = document.getElementById("modalContent");

  mc.innerHTML = `
    <div class="modal-cat">${n.emoji||"📰"} ${(n.category||"geral").toUpperCase()}</div>
    <h2>${esc(n.title)}</h2>
    <div class="modal-meta">${esc(n.source)} · ${fmtDate(n.date)}${n.link?` · <a href="${n.link}" target="_blank" rel="noopener">Fonte original ↗</a>`:""}</div>
    <div class="modal-body">
      <div class="modal-spinner"><div class="spinner"></div><span>Gerando artigo completo com IA (${getModelLabel()})…</span></div>
    </div>
    <div class="modal-actions"><button class="modal-close" onclick="closeModal()">Fechar</button></div>`;
  ov.classList.add("open");

  if(!n.content){
    try{
      const isExtended = document.querySelector('.model-btn[data-extended="true"]')?.classList.contains("active");
      const len = isExtended ? "6 parágrafos bem desenvolvidos" : "4 parágrafos";
      const prompt = `Você é um jornalista sênior da VCtv AInews. Escreva um artigo jornalístico completo em português do Brasil sobre: "${n.title}". Contexto: ${n.summary}. Escreva exatamente ${len}, separados por linha em branco. Tom profissional e envolvente. SEM markdown, SEM títulos, apenas parágrafos de texto corrido.`;
      const text = await askAI(prompt, idx*7);
      n.content = text||n.summary||"Conteúdo indisponível.";
      // Salva cache atualizado
      try{ localStorage.setItem("vctv4_"+todayKey+"_"+currentEdition,JSON.stringify(allNews)); }catch(e){}
    }catch(e){
      n.content = n.summary||"Não foi possível gerar o artigo. Verifique sua conexão e tente novamente.";
    }
  }

  const paras = n.content.split(/\n+/).filter(p=>p.trim()).map(p=>`<p>${esc(p)}</p>`).join("");
  mc.innerHTML = `
    <div class="modal-cat">${n.emoji||"📰"} ${(n.category||"geral").toUpperCase()}</div>
    <h2>${esc(n.title)}</h2>
    <div class="modal-meta">${esc(n.source)} · ${fmtDate(n.date)}${n.link?` · <a href="${n.link}" target="_blank" rel="noopener">Fonte original ↗</a>`:""}</div>
    <div class="modal-body">${paras}</div>
    <div class="modal-actions"><button class="modal-close" onclick="closeModal()">Fechar</button></div>`;
}

function getModelLabel(){
  const btn = document.querySelector(".model-btn.active");
  return btn ? btn.textContent.trim() : "Sonnet";
}

function closeModal(){ document.getElementById("modalOverlay").classList.remove("open"); }
function closeModalBg(e){ if(e.target===document.getElementById("modalOverlay")) closeModal(); }

// ── GERAR NOTÍCIA CUSTOM ──────────────────────────────────────────────────────
async function generateCustomNews(){
  const topic = document.getElementById("topicInput").value.trim();
  if(!topic) return;
  const btn = document.getElementById("genBtn");
  btn.disabled=true; btn.textContent="⏳ Gerando…";
  try{
    const isExtended = document.querySelector('.model-btn[data-extended="true"]')?.classList.contains("active");
    const len = isExtended ? "6 parágrafos" : "4 parágrafos";
    const prompt = `Você é um jornalista da VCtv AInews. Crie uma notícia jornalística completa em português do Brasil sobre: "${topic}". Retorne APENAS um JSON sem markdown: {"title":"Título da notícia","summary":"Resumo em 3 frases completas e informativas.","category":"tecnologia","emoji":"💻","content":"Parágrafo 1\\n\\nParágrafo 2\\n\\nParágrafo 3\\n\\nParágrafo 4"}. O campo content deve ter ${len} ricos e informativos. Categorias válidas: tecnologia, mundo, ciencia, economia, cultura, esportes.`;
    const text = await askAI(prompt, Date.now()%9999);
    if(!text) throw new Error("sem resposta");
    const clean = text.replace(/```json|```/g,"").trim();
    const s=clean.indexOf("{"),e=clean.lastIndexOf("}");
    const n = JSON.parse(clean.slice(s,e+1));
    n.source = `VCtv IA · ${getModelLabel()} · gerado agora`;
    n.date = new Date();
    allNews.unshift(n);
    renderNews();
    openModal(0);
    document.getElementById("topicInput").value="";
  }catch(e){
    alert("Não foi possível gerar a notícia. Tente um tema mais específico ou aguarde um momento.");
  }
  btn.disabled=false; btn.textContent="📰 Gerar Notícia";
}

function updateTicker(){
  const titles = allNews.slice(0,8).map(n=>`${n.emoji||"📰"} ${n.title}`).join("  ·  ");
  document.getElementById("tickerText").textContent = titles||"VCtv AInews — Notícias do dia";
}
