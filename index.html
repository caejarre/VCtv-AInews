<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCtv AInews</title>
<style>
  :root {
    --red: #cc0000;
    --dark: #0a0a0a;
    --darker: #050505;
    --card: #111;
    --border: #222;
    --text: #e8e8e8;
    --muted: #888;
    --accent: #ff3333;
    --gold: #f5c518;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); color:var(--text); font-family:'Georgia',serif; min-height:100vh; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0a0a0a 0%, #1a0000 50%, #0a0a0a 100%);
    border-bottom: 3px solid var(--red);
    padding: 0;
    position: sticky; top:0; z-index:100;
    box-shadow: 0 2px 20px rgba(204,0,0,0.4);
  }
  .header-top {
    display:flex; align-items:center; justify-content:space-between;
    padding: 12px 24px;
    gap: 16px;
  }
  .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .logo-icon {
    background: var(--red);
    color: white;
    font-size: 11px; font-weight:900; letter-spacing:1px;
    padding: 4px 8px; border-radius:4px;
    font-family: 'Arial Black', sans-serif;
  }
  .logo-text {
    font-size: 22px; font-weight:900; color:white;
    font-family: 'Arial Black', sans-serif; letter-spacing:2px;
  }
  .logo-text span { color: var(--red); }
  .edition-badge {
    font-size:11px; padding:4px 10px; border-radius:20px; font-weight:700;
    font-family: Arial, sans-serif; letter-spacing:1px;
  }
  .badge-daily { background:#1a3a1a; color:#4caf50; border:1px solid #4caf50; }
  .badge-weekend { background:#1a1a3a; color:#6699ff; border:1px solid #6699ff; }
  .badge-special { background:#3a2a00; color:var(--gold); border:1px solid var(--gold); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  .ticker-bar {
    background: var(--red);
    padding: 6px 0;
    overflow: hidden;
    white-space: nowrap;
  }
  .ticker-inner {
    display: inline-block;
    animation: ticker 40s linear infinite;
    font-size: 12px; font-family: Arial, sans-serif; font-weight:600; letter-spacing:0.5px;
  }
  @keyframes ticker { 0%{transform:translateX(100vw)} 100%{transform:translateX(-100%)} }

  /* NAV */
  nav {
    display:flex; gap:0; overflow-x:auto;
    border-bottom: 1px solid var(--border);
    background:#0d0d0d;
  }
  nav button {
    background:none; border:none; color:var(--muted);
    padding: 10px 18px; cursor:pointer; font-size:13px;
    font-family: Arial, sans-serif; font-weight:600; letter-spacing:0.5px;
    border-bottom: 2px solid transparent; transition: all 0.2s;
    white-space:nowrap;
  }
  nav button:hover, nav button.active { color:white; border-bottom-color:var(--red); }

  /* MAIN */
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

  /* GENERATE BAR */
  .gen-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 28px;
    display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  }
  .gen-bar input {
    flex:1; min-width:200px;
    background:#1a1a1a; border:1px solid #333; color:white;
    padding: 10px 14px; border-radius:6px; font-size:14px;
    font-family: Georgia, serif;
  }
  .gen-bar input:focus { outline:none; border-color:var(--red); }
  .gen-bar button {
    background: var(--red); color:white; border:none;
    padding: 10px 20px; border-radius:6px; cursor:pointer;
    font-weight:700; font-family:Arial,sans-serif; font-size:13px;
    transition: background 0.2s;
  }
  .gen-bar button:hover { background:#aa0000; }
  .gen-bar button:disabled { background:#444; cursor:not-allowed; }

  /* GRID */
  .news-grid { display:grid; grid-template-columns: 2fr 1fr; gap:24px; }
  .news-grid.weekend { grid-template-columns: 1fr 1fr 1fr; }
  @media(max-width:768px) { .news-grid, .news-grid.weekend { grid-template-columns:1fr; } }

  .main-col { display:flex; flex-direction:column; gap:20px; }
  .side-col { display:flex; flex-direction:column; gap:16px; }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    cursor: pointer;
  }
  .card:hover { border-color: var(--red); transform: translateY(-2px); }
  .card-img {
    width:100%; height:200px; object-fit:cover;
    background: linear-gradient(135deg, #1a0000, #0a0a1a);
    display:flex; align-items:center; justify-content:center;
    font-size:48px;
  }
  .card-img.small { height:120px; font-size:32px; }
  .card-body { padding:16px; }
  .card-cat {
    font-size:10px; font-weight:700; color:var(--red);
    font-family:Arial,sans-serif; letter-spacing:1.5px; text-transform:uppercase;
    margin-bottom:6px;
  }
  .card-title {
    font-size:18px; font-weight:700; line-height:1.3;
    margin-bottom:8px; color:white;
  }
  .card-title.small { font-size:14px; }
  .card-body p { font-size:14px; color:#aaa; line-height:1.6; margin-bottom:10px; }
  .card-meta {
    font-size:11px; color:var(--muted);
    font-family:Arial,sans-serif; display:flex; gap:12px; align-items:center;
  }
  .card-meta .source { color: var(--red); font-weight:700; }

  /* FEATURED (hero) */
  .hero-card {
    background: linear-gradient(to bottom, #1a0505, var(--card));
    border: 2px solid var(--red);
    border-radius: 12px; overflow:hidden;
  }
  .hero-card .card-img { height:280px; font-size:64px; }
  .hero-card .card-title { font-size:24px; }

  /* SPECIAL BANNER */
  .special-banner {
    background: linear-gradient(135deg, #1a1400, #2a2000);
    border: 2px solid var(--gold);
    border-radius:10px; padding:16px 20px;
    margin-bottom:24px;
    display:flex; align-items:center; gap:12px;
  }
  .special-banner .icon { font-size:28px; }
  .special-banner h2 { color:var(--gold); font-size:18px; margin-bottom:4px; }
  .special-banner p { color:#ccc; font-size:13px; }

  /* LOADING */
  .loading {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:60px 20px; gap:16px; color:var(--muted);
  }
  .spinner {
    width:40px; height:40px; border:3px solid #222;
    border-top-color:var(--red); border-radius:50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* MODAL */
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.85); z-index:200;
    align-items:center; justify-content:center; padding:16px;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:#111; border:1px solid #333; border-radius:12px;
    max-width:700px; width:100%; max-height:90vh; overflow-y:auto;
    padding:28px;
  }
  .modal-cat { font-size:11px; color:var(--red); font-weight:700; letter-spacing:1.5px; font-family:Arial,sans-serif; margin-bottom:8px; }
  .modal h2 { font-size:22px; line-height:1.3; margin-bottom:12px; }
  .modal-meta { font-size:12px; color:var(--muted); font-family:Arial,sans-serif; margin-bottom:16px; }
  .modal-body { font-size:15px; line-height:1.8; color:#ccc; }
  .modal-body p { margin-bottom:12px; }
  .modal-close {
    background:none; border:1px solid #444; color:#aaa;
    padding:8px 16px; border-radius:6px; cursor:pointer;
    font-size:13px; margin-top:20px; float:right;
  }
  .modal-close:hover { background:#222; }

  /* WEEKEND SECTION TITLE */
  .section-title {
    font-size:13px; font-weight:700; color:var(--red);
    font-family:Arial,sans-serif; letter-spacing:2px; text-transform:uppercase;
    border-left:3px solid var(--red); padding-left:10px;
    margin-bottom:16px;
  }

  /* FOOTER */
  footer {
    border-top:1px solid var(--border); margin-top:48px;
    padding:20px; text-align:center; color:var(--muted);
    font-size:12px; font-family:Arial,sans-serif;
  }
  footer span { color:var(--red); }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <a class="logo" href="#">
      <span class="logo-icon">VC</span>
      <span class="logo-text">VCtv <span>AI</span>news</span>
    </a>
    <span id="editionBadge" class="edition-badge badge-daily">EDIÇÃO DIÁRIA</span>
    <span id="dateDisplay" style="font-size:12px;color:#888;font-family:Arial,sans-serif;"></span>
  </div>
  <div class="ticker-bar">
    <span class="ticker-inner" id="tickerText">⚡ Carregando últimas notícias... aguarde...</span>
  </div>
  <nav>
    <button class="active" onclick="setCategory('tudo',this)">TUDO</button>
    <button onclick="setCategory('tecnologia',this)">TECNOLOGIA</button>
    <button onclick="setCategory('mundo',this)">MUNDO</button>
    <button onclick="setCategory('ciencia',this)">CIÊNCIA</button>
    <button onclick="setCategory('economia',this)">ECONOMIA</button>
    <button onclick="setCategory('cultura',this)">CULTURA</button>
    <button onclick="setCategory('esportes',this)">ESPORTES</button>
  </nav>
</header>

<div class="container">
  <div class="gen-bar">
    <input id="topicInput" type="text" placeholder="✍️ Escreva sobre o que quer uma notícia... ex: 'Copa do Mundo 2026'" />
    <button id="genBtn" onclick="generateCustomNews()">Gerar Notícia</button>
  </div>
  <div id="specialBanner"></div>
  <div id="newsContainer" class="loading">
    <div class="spinner"></div>
    <span>Buscando notícias do dia...</span>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<footer>
  <p><span>VCtv AInews</span> — Gerado por IA · Atualizado diariamente · <span>VCtv</span> © 2025</p>
</footer>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const POLLINATIONS_TEXT = "https://text.pollinations.ai/";
const RSS_PROXIES = [
  "https://api.rss2json.com/v1/api.json?rss_url=",
  "https://rss.app/feeds/"
];

// RSS feeds públicos (CORS-friendly via rss2json)
const RSS_FEEDS = [
  { url:"https://feeds.bbci.co.uk/portuguese/rss.xml", name:"BBC Brasil", cat:"mundo" },
  { url:"https://g1.globo.com/rss/g1/tecnologia/", name:"G1 Tech", cat:"tecnologia" },
  { url:"https://g1.globo.com/rss/g1/ciencia-e-saude/", name:"G1 Ciência", cat:"ciencia" },
  { url:"https://g1.globo.com/rss/g1/economia/", name:"G1 Economia", cat:"economia" },
  { url:"https://feeds.bbci.co.uk/portuguese/science/rss.xml", name:"BBC Ciência", cat:"ciencia" },
  { url:"https://www.nasa.gov/rss/dyn/breaking_news.rss", name:"NASA", cat:"ciencia" },
  { url:"https://techcrunch.com/feed/", name:"TechCrunch", cat:"tecnologia" },
];

const EMOJIS = { tecnologia:"💻", mundo:"🌍", ciencia:"🔬", economia:"💰", cultura:"🎭", esportes:"⚽", geral:"📰" };
const SPECIAL_DATES = {
  "01-01":"🎆 Feliz Ano Novo! Edição Especial de Ano Novo",
  "25-12":"🎄 Feliz Natal! Edição Especial de Natal",
  "07-09":"🇧🇷 Independência do Brasil — Edição Patriótica",
  "12-10":"🎉 Dia das Crianças — Edição Especial",
  "02-11":"🕯️ Finados — Edição Reflexiva",
  "15-11":"🇧🇷 Proclamação da República — Edição Histórica",
};

let allNews = [];
let currentCategory = "tudo";
let currentEdition = "daily";

// ─── DATE HELPERS ───────────────────────────────────────────────────────────
const now = new Date();
const todayKey = now.toDateString();
const dayOfWeek = now.getDay(); // 0=dom, 6=sab
const mmdd = String(now.getDate()).padStart(2,"0") + "-" + String(now.getMonth()+1).padStart(2,"0");
const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
const isSpecial = !!SPECIAL_DATES[mmdd];

function getEditionType() {
  if (isSpecial) return "special";
  if (isWeekend) return "weekend";
  return "daily";
}

function formatDate(d) {
  return d.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}

// ─── INIT ───────────────────────────────────────────────────────────────────
document.getElementById("dateDisplay").textContent = formatDate(now);

(async function init() {
  currentEdition = getEditionType();
  setupEditionBadge();
  showSpecialBanner();
  await loadNews();
})();

function setupEditionBadge() {
  const badge = document.getElementById("editionBadge");
  if (currentEdition === "special") {
    badge.className = "edition-badge badge-special";
    badge.textContent = "✨ EDIÇÃO ESPECIAL";
  } else if (currentEdition === "weekend") {
    badge.className = "edition-badge badge-weekend";
    badge.textContent = "📅 EDIÇÃO FIM DE SEMANA";
  } else {
    badge.className = "edition-badge badge-daily";
    badge.textContent = "📰 EDIÇÃO DIÁRIA";
  }
}

function showSpecialBanner() {
  if (!isSpecial) return;
  document.getElementById("specialBanner").innerHTML = `
    <div class="special-banner">
      <span class="icon">✨</span>
      <div>
        <h2>${SPECIAL_DATES[mmdd]}</h2>
        <p>Hoje publicamos uma edição especial comemorativa com cobertura ampliada.</p>
      </div>
    </div>`;
}

// ─── FETCH RSS ───────────────────────────────────────────────────────────────
async function fetchRSS(feed) {
  const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}&api_key=&count=5`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    if (d.status !== "ok" || !d.items?.length) return [];
    return d.items.map(item => ({
      title: item.title || "",
      summary: stripHtml(item.description || item.content || "").slice(0,300),
      link: item.link,
      date: item.pubDate ? new Date(item.pubDate) : now,
      source: feed.name,
      category: feed.cat,
      emoji: EMOJIS[feed.cat] || "📰",
      content: null
    }));
  } catch { return []; }
}

function stripHtml(h) {
  return h.replace(/<[^>]*>/g,"").replace(/&[a-z]+;/g," ").replace(/\s+/g," ").trim();
}

// ─── LOAD ALL NEWS ────────────────────────────────────────────────────────────
async function loadNews() {
  const container = document.getElementById("newsContainer");
  // Check cache
  const cacheKey = "vctv_news_" + todayKey + "_" + currentEdition;
  const cached = localStorage.getItem(cacheKey);
  if (cached) {
    allNews = JSON.parse(cached);
    renderNews();
    updateTicker();
    return;
  }

  // Fetch RSS
  const feedsToFetch = isWeekend || isSpecial ? RSS_FEEDS : RSS_FEEDS.slice(0,5);
  const results = await Promise.all(feedsToFetch.map(fetchRSS));
  let raw = results.flat().filter(n => n.title.length > 10);

  // Remove duplicates
  const seen = new Set();
  raw = raw.filter(n => { if (seen.has(n.title)) return false; seen.add(n.title); return true; });

  // Sort by date
  raw.sort((a,b) => b.date - a.date);
  allNews = raw.slice(0, isWeekend || isSpecial ? 20 : 12);

  // Enhance top stories with AI
  if (allNews.length > 0) {
    await enhanceWithAI(allNews.slice(0, isWeekend ? 6 : 3));
  }

  // Fallback if RSS failed
  if (allNews.length === 0) {
    allNews = await generateFallbackNews();
  }

  try { localStorage.setItem(cacheKey, JSON.stringify(allNews)); } catch(e){}
  renderNews();
  updateTicker();
}

// ─── AI ENHANCE ──────────────────────────────────────────────────────────────
async function enhanceWithAI(items) {
  for (let i = 0; i < items.length; i++) {
    try {
      const prompt = `Você é um jornalista brasileiro. Escreva um parágrafo introdutório jornalístico de 3 frases sobre esta notícia, em português, de forma envolvente e informativa. Título: "${items[i].title}". Resumo: "${items[i].summary}". Responda APENAS com o parágrafo, sem título.`;
      const res = await fetch(POLLINATIONS_TEXT + encodeURIComponent(prompt) + "?model=openai&seed=42");
      const text = await res.text();
      if (text && text.length > 20) allNews[i].aiIntro = text.trim().slice(0,500);
    } catch(e) {}
  }
}

// ─── FALLBACK: full AI news ───────────────────────────────────────────────────
async function generateFallbackNews() {
  const prompt = `Você é redator da VCtv AInews. Gere 6 notícias atuais importantes de ${new Date().toLocaleDateString("pt-BR")} em JSON. Retorne APENAS um array JSON sem markdown. Cada objeto: {"title":"...","summary":"...","category":"tecnologia|mundo|ciencia|economia|cultura|esportes","emoji":"..."}. As notícias devem ser realistas, variadas e relevantes.`;
  try {
    const res = await fetch(POLLINATIONS_TEXT + encodeURIComponent(prompt) + "?model=openai&seed=99");
    const text = await res.text();
    const clean = text.replace(/```json|```/g,"").trim();
    const arr = JSON.parse(clean);
    return arr.map(n => ({...n, source:"VCtv IA", date:now, content:null}));
  } catch {
    return [{title:"Sem conexão — modo offline", summary:"Verifique sua internet para carregar notícias.", category:"geral", emoji:"📡", source:"Sistema", date:now}];
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function setCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderNews();
}

function renderNews() {
  const container = document.getElementById("newsContainer");
  let filtered = currentCategory === "tudo" ? allNews : allNews.filter(n => n.category === currentCategory);
  if (filtered.length === 0) {
    container.innerHTML = `<div class="loading"><span>Nenhuma notícia nesta categoria hoje.</span></div>`;
    return;
  }
  container.className = "";

  if (currentEdition === "weekend" || currentEdition === "special") {
    container.innerHTML = renderWeekendLayout(filtered);
  } else {
    container.innerHTML = renderDailyLayout(filtered);
  }
}

function renderDailyLayout(news) {
  const [hero, ...rest] = news;
  const side = rest.slice(0,4);
  const below = rest.slice(4);
  return `
    <div class="news-grid">
      <div class="main-col">
        ${heroCard(hero)}
        ${below.map(n => smallCard(n)).join("")}
      </div>
      <div class="side-col">
        ${side.map(n => sideCard(n)).join("")}
      </div>
    </div>`;
}

function renderWeekendLayout(news) {
  const sections = {};
  news.forEach(n => { if (!sections[n.category]) sections[n.category] = []; sections[n.category].push(n); });
  let html = `<div class="news-grid weekend">`;
  let col = 0;
  for (const [cat, items] of Object.entries(sections)) {
    if (col === 0) html += `<div class="main-col">`;
    html += `<div class="section-title">${EMOJIS[cat]||"📰"} ${cat.toUpperCase()}</div>`;
    items.forEach(n => { html += smallCard(n); });
    if (col === 2) { html += `</div>`; col = 0; } else col++;
  }
  if (col > 0) html += `</div>`;
  html += `</div>`;
  return html;
}

function heroCard(n) {
  if (!n) return "";
  const idx = allNews.indexOf(n);
  return `<div class="card hero-card" onclick="openModal(${idx})">
    <div class="card-img">${n.emoji}</div>
    <div class="card-body">
      <div class="card-cat">${n.category?.toUpperCase()||"GERAL"}</div>
      <div class="card-title">${esc(n.title)}</div>
      <p>${esc(n.aiIntro || n.summary || "")}</p>
      <div class="card-meta"><span class="source">${n.source||""}</span><span>${fmtDate(n.date)}</span></div>
    </div>
  </div>`;
}

function smallCard(n) {
  const idx = allNews.indexOf(n);
  return `<div class="card" onclick="openModal(${idx})">
    <div class="card-body">
      <div class="card-cat">${n.category?.toUpperCase()||"GERAL"}</div>
      <div class="card-title small">${esc(n.title)}</div>
      <p style="font-size:13px">${esc((n.aiIntro||n.summary||"").slice(0,120))}...</p>
      <div class="card-meta"><span class="source">${n.source||""}</span><span>${fmtDate(n.date)}</span></div>
    </div>
  </div>`;
}

function sideCard(n) {
  const idx = allNews.indexOf(n);
  return `<div class="card" onclick="openModal(${idx})">
    <div class="card-img small">${n.emoji}</div>
    <div class="card-body">
      <div class="card-cat">${n.category?.toUpperCase()||"GERAL"}</div>
      <div class="card-title small">${esc(n.title)}</div>
      <div class="card-meta"><span class="source">${n.source||""}</span></div>
    </div>
  </div>`;
}

function esc(s) { return (s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtDate(d) {
  if (!d) return "";
  try { return new Date(d).toLocaleDateString("pt-BR"); } catch { return ""; }
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
async function openModal(idx) {
  const n = allNews[idx];
  if (!n) return;
  const overlay = document.getElementById("modalOverlay");
  const mc = document.getElementById("modalContent");
  mc.innerHTML = `
    <div class="modal-cat">${n.emoji} ${(n.category||"geral").toUpperCase()}</div>
    <h2>${esc(n.title)}</h2>
    <div class="modal-meta">${n.source||""} · ${fmtDate(n.date)}</div>
    <div class="modal-body"><div class="spinner" style="margin:20px auto"></div></div>
    <button class="modal-close" onclick="closeModal()">Fechar</button>`;
  overlay.classList.add("open");

  if (!n.content) {
    try {
      const prompt = `Você é um jornalista da VCtv AInews. Escreva um artigo jornalístico completo em português sobre: "${n.title}". Contexto: ${n.summary||""}. Escreva 4 parágrafos bem desenvolvidos, com fatos, contexto e impacto. Tom profissional e informativo.`;
      const res = await fetch(POLLINATIONS_TEXT + encodeURIComponent(prompt) + "?model=openai&seed=" + idx);
      const text = await res.text();
      n.content = text.trim();
    } catch { n.content = n.summary || "Conteúdo indisponível."; }
  }

  const paras = n.content.split(/\n+/).filter(p=>p.trim()).map(p=>`<p>${esc(p)}</p>`).join("");
  mc.innerHTML = `
    <div class="modal-cat">${n.emoji} ${(n.category||"geral").toUpperCase()}</div>
    <h2>${esc(n.title)}</h2>
    <div class="modal-meta">${n.source||""} · ${fmtDate(n.date)}${n.link?` · <a href="${n.link}" target="_blank" style="color:var(--red)">Fonte original</a>`:""}</div>
    <div class="modal-body">${paras}</div>
    <button class="modal-close" onclick="closeModal()">Fechar</button>`;
}

function closeModal(e) {
  if (!e || e.target === document.getElementById("modalOverlay"))
    document.getElementById("modalOverlay").classList.remove("open");
}

// ─── CUSTOM NEWS ─────────────────────────────────────────────────────────────
async function generateCustomNews() {
  const topic = document.getElementById("topicInput").value.trim();
  if (!topic) return;
  const btn = document.getElementById("genBtn");
  btn.disabled = true; btn.textContent = "Gerando...";
  try {
    const prompt = `Você é um jornalista da VCtv AInews. Crie uma notícia jornalística completa em português sobre: "${topic}". Retorne APENAS um JSON com: {"title":"...","summary":"...","category":"tecnologia|mundo|ciencia|economia|cultura|esportes|geral","emoji":"...","content":"..."}. O content deve ter 4 parágrafos separados por \\n\\n.`;
    const res = await fetch(POLLINATIONS_TEXT + encodeURIComponent(prompt) + "?model=openai&seed=" + Date.now());
    const text = await res.text();
    const clean = text.replace(/```json|```/g,"").trim();
    const n = JSON.parse(clean);
    n.source = "VCtv IA · Gerado agora";
    n.date = new Date();
    allNews.unshift(n);
    renderNews();
    openModal(0);
  } catch(e) {
    alert("Erro ao gerar notícia. Tente novamente.");
  }
  btn.disabled = false; btn.textContent = "Gerar Notícia";
  document.getElementById("topicInput").value = "";
}

// ─── TICKER ───────────────────────────────────────────────────────────────────
function updateTicker() {
  const titles = allNews.slice(0,8).map(n => `${n.emoji} ${n.title}`).join("  ·  ");
  document.getElementById("tickerText").textContent = titles;
}
</script>
