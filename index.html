<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCtv AI News</title>

<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #f4f1ea;
  font-family: 'Inter', sans-serif;
  color: #222;
}

header {
  background: #111;
  color: white;
  padding: 20px;
  text-align: center;
}

h1 {
  font-family: 'Merriweather', serif;
  font-size: 42px;
  margin: 0;
}

.controls {
  padding: 15px;
  text-align: center;
  background: #e6e2d9;
}

select, button {
  padding: 10px;
  margin: 5px;
  font-size: 16px;
}

#news {
  column-count: 2;
  column-gap: 40px;
  padding: 30px;
  max-width: 1200px;
  margin: auto;
}

.article {
  break-inside: avoid;
  background: white;
  margin-bottom: 20px;
  padding: 15px;
  border-left: 5px solid #111;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.article h2 {
  font-family: 'Merriweather', serif;
  font-size: 24px;
  margin-top: 0;
}

.meta {
  font-size: 12px;
  color: gray;
  margin-bottom: 10px;
}

.loading {
  text-align: center;
  font-size: 18px;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <h1>VCtv AI NEWS</h1>
  <div>Jornal gerado por Inteligência Artificial</div>
</header>

<div class="controls">
  Modelo de IA:
  <select id="model">
    <option value="haiku">Haiku (rápido)</option>
    <option value="sonnet">Sonnet (bom)</option>
    <option value="opus">Opus (melhor)</option>
    <option value="extended">Estendido (muito longo)</option>
  </select>

  <button onclick="generateNews()">Gerar Jornal</button>
</div>

<div id="loading" class="loading"></div>
<div id="news"></div>

<script>
const RSS_FEEDS = [
  "https://rss.cnn.com/rss/edition.rss",
  "https://feeds.bbci.co.uk/news/rss.xml",
  "https://g1.globo.com/rss/g1/",
  "https://rss.nytimes.com/services/xml/rss/nyt/World.xml"
];

const PROXIES = [
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`
];

async function fetchRSS(url) {
  for (let proxy of PROXIES) {
    try {
      let response = await fetch(proxy(url));
      let text = await response.text();

      if (text.includes("contents")) {
        text = JSON.parse(text).contents;
      }

      return new window.DOMParser().parseFromString(text, "text/xml");
    } catch (e) {}
  }
  return null;
}

function getModelPrompt(model) {
  if (model === "haiku") return "Escreva uma notícia curta estilo jornal.";
  if (model === "sonnet") return "Escreva uma notícia média estilo jornal profissional.";
  if (model === "opus") return "Escreva uma notícia longa, detalhada, estilo jornal real.";
  if (model === "extended") return "Escreva uma notícia MUITO longa, com vários parágrafos, estilo jornal impresso.";
}

async function generateText(title, model) {
  const prompt = getModelPrompt(model) + " Baseada no título: " + title;

  // Simulação IA (rápida para GitHub)
  return new Promise(resolve => {
    setTimeout(() => {
      resolve(`
        ${title} — Em um desenvolvimento recente, especialistas afirmam que essa situação
        pode impactar diversas áreas da sociedade. Analistas indicam que o cenário ainda
        está em evolução, e novas informações devem surgir nos próximos dias.
        Autoridades acompanham o caso e a população reage com atenção às mudanças.
        Essa notícia pode ter efeitos importantes no futuro próximo.
      `);
    }, 500);
  });
}

async function generateNews() {
  const model = document.getElementById("model").value;
  const newsDiv = document.getElementById("news");
  const loading = document.getElementById("loading");

  newsDiv.innerHTML = "";
  loading.innerText = "Gerando jornal...";

  let articles = [];

  for (let feed of RSS_FEEDS) {
    let xml = await fetchRSS(feed);
    if (!xml) continue;

    let items = xml.querySelectorAll("item");

    for (let i = 0; i < 3; i++) {
      let title = items[i].querySelector("title").textContent;
      let date = items[i].querySelector("pubDate")?.textContent || "";

      let text = await generateText(title, model);

      articles.push({ title, date, text });
    }
  }

  loading.innerText = "";

  articles.forEach(a => {
    let div = document.createElement("div");
    div.className = "article";
    div.innerHTML = `
      <h2>${a.title}</h2>
      <div class="meta">${a.date}</div>
      <p>${a.text}</p>
    `;
    newsDiv.appendChild(div);
  });
}
</script>

</body>
</html>
