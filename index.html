<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VCtv AInews PRO</title>

<style>
:root{
--red:#cc0000;
--bg:#0a0a0a;
--card:#111;
--text:#eee;
--muted:#888;
}

body{margin:0;background:var(--bg);color:var(--text);font-family:Georgia,serif}

/* HEADER */
header{
background:#000;
padding:15px;
border-bottom:3px solid var(--red);
display:flex;
justify-content:space-between;
align-items:center;
}
.logo{font-size:26px;font-weight:900;cursor:pointer}
.logo span{color:red}

/* CONTROLES */
.controls{
padding:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}
.controls input{
flex:1;
padding:10px;
background:#111;
border:1px solid #333;
color:#fff;
}
.controls button{
background:var(--red);
border:none;
color:#fff;
padding:10px;
cursor:pointer;
}

/* GRID */
.news{
padding:20px;
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}
@media(max-width:800px){
.news{grid-template-columns:1fr;}
}

/* HERO */
.hero{
background:var(--card);
padding:25px;
border-left:5px solid var(--red);
cursor:pointer;
}
.hero h1{font-size:30px}

/* SIDE */
.card{
background:var(--card);
padding:15px;
margin-bottom:10px;
cursor:pointer;
}
.card p{color:var(--muted)}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:#000c;
display:none;
justify-content:center;
align-items:center;
}
.box{
background:#111;
padding:25px;
max-width:800px;
max-height:90vh;
overflow:auto;
}

/* FOOTER */
footer{
text-align:center;
color:#555;
padding:20px;
border-top:1px solid #222;
}

/* EASTER */
.matrix{background:black;color:#00ff00}
.super{filter:contrast(150%)}
</style>
</head>

<body>

<header>
<div class="logo" onclick="logoClick()">VCtv <span>AInews</span></div>
<button onclick="loadNews()">Atualizar</button>
</header>

<div class="controls">
<input id="tema" placeholder="Gerar notícia personalizada REAL">
<button onclick="custom()">Gerar</button>
</div>

<div id="news" class="news"></div>

<div id="modal" class="modal" onclick="closeModal()">
<div class="box" id="box"></div>
</div>

<footer>VCtv AInews — Notícias reais + IA</footer>

<script>

let noticias=[];

/* RSS REAL */
async function loadNews(){
document.getElementById("news").innerHTML="Carregando notícias reais...";

let feeds=[
"https://g1.globo.com/rss/g1/",
"https://feeds.bbci.co.uk/portuguese/rss.xml"
];

let all=[];

for(let f of feeds){
try{
let r=await fetch("https://api.allorigins.win/get?url="+encodeURIComponent(f));
let d=await r.json();
let xml=new DOMParser().parseFromString(d.contents,"text/xml");

[...xml.querySelectorAll("item")].slice(0,6).forEach(i=>{
all.push({
title:i.querySelector("title").textContent,
desc:i.querySelector("description").textContent,
link:i.querySelector("link").textContent
});
});
}catch{}
}

if(!all.length){
all=[{title:"Erro ao carregar notícias",desc:"Tente novamente"}];
}

noticias=all;
render();
}

/* RENDER */
function render(){
let hero=noticias[0];
let side=noticias.slice(1,6);

document.getElementById("news").innerHTML=`
<div class="hero" onclick="openNews(0)">
<h1>${hero.title}</h1>
<p>${hero.desc}</p>
</div>

<div>
${side.map((n,i)=>`
<div class="card" onclick="openNews(${i+1})">
<b>${n.title}</b>
<p>${n.desc.substring(0,120)}...</p>
</div>`).join("")}
</div>
`;
}

/* IA (FORTE + SEM FAKE) */
async function gerarIA(n){

async function gerarBloco(){
let prompt=`
Você é um jornalista.

REGRAS:
- NÃO inventar fatos
- usar apenas a informação abaixo
- escrever 4 parágrafos
- cada parágrafo com 3 frases

Notícia:
${n.title}
${n.desc}
`;

let r=await fetch("https://text.pollinations.ai/"+encodeURIComponent(prompt));
let txt=await r.text();

if(!txt || txt.length<200) return "";

if(txt.includes("IMPORTANT")) return "";
if(/[一-龯]/.test(txt)) return "";

return txt;
}

/* juntar */
let final="";
for(let i=0;i<3;i++){
let parte=await gerarBloco();
if(parte) final+=parte+"\n\n";
if(final.length>800) break;
}

if(final.length<200) return n.desc;

return final;
}

/* ABRIR */
async function openNews(i){
let n=noticias[i];

document.getElementById("modal").style.display="flex";
document.getElementById("box").innerHTML="Gerando...";

let txt=await gerarIA(n);

document.getElementById("box").innerHTML=`
<h2>${n.title}</h2>
<p>${txt.replace(/\n/g,"<br><br>")}</p>
<br>
<a href="${n.link}" target="_blank">Fonte original</a>
<br><br>
<button onclick="closeModal()">Fechar</button>
`;
}

/* CUSTOM REAL */
async function custom(){
let tema=document.getElementById("tema").value.trim();
if(!tema) return;

document.getElementById("modal").style.display="flex";
document.getElementById("box").innerHTML="Gerando notícia...";

let prompt=`
Você é jornalista.

Crie uma notícia realista sobre:
"${tema}"

Regras:
- mínimo 5 parágrafos
- não repetir frases
- não escrever "tema solicitado"
- estilo jornal
`;

let texto="";

for(let i=0;i<3;i++){
try{
let r=await fetch("https://text.pollinations.ai/"+encodeURIComponent(prompt));
let t=await r.text();

if(!t) continue;
if(t.length<300) continue;
if(t.includes("tema solicitado")) continue;

texto=t;
break;

}catch{}
}

if(!texto) texto="Erro ao gerar notícia.";

document.getElementById("box").innerHTML=`
<h2>${tema}</h2>
<p>${texto.replace(/\n/g,"<br><br>")}</p>
<br>
<button onclick="closeModal()">Fechar</button>
`;
}

/* MODAL */
function closeModal(){
document.getElementById("modal").style.display="none";
}

/* EASTER EGGS */
let seq="";
document.addEventListener("keydown",e=>{
seq+=e.key.toLowerCase();

if(seq.includes("vctv")){
alert("Easter Egg ativado 😎");
seq="";
}

if(e.key==="m"){
document.body.classList.toggle("matrix");
}

if(e.shiftKey && e.key==="V"){
document.body.classList.toggle("super");
}
});

let clicks=0;
function logoClick(){
clicks++;
if(clicks>=7){
document.body.style.filter="hue-rotate(120deg)";
setTimeout(()=>document.body.style.filter="",1000);
clicks=0;
}
}

/* START */
loadNews();

</script>

</body>
</html>
