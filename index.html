<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCtv AInews</title>

<style>
:root{
--red:#cc0000;
--bg:#0a0a0a;
--card:#111;
--text:#eee;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:Georgia,serif;
}

/* CONFIG SCREEN */
#setup{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:15px;
z-index:999;
}
#setup select,#setup button{
padding:10px;
background:#111;
color:#fff;
border:1px solid #333;
}

/* HEADER */
header{
background:#000;
padding:15px;
border-bottom:3px solid var(--red);
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
cursor:pointer;
}
.logo span{color:red}

/* CONTROLES */
.controls{
display:flex;
gap:10px;
padding:10px;
flex-wrap:wrap;
}
.controls input,.controls select{
padding:8px;
background:#111;
border:1px solid #333;
color:#fff;
}

/* GRID */
.news{
padding:15px;
display:grid;
grid-template-columns:2fr 1fr;
gap:15px;
}
@media(max-width:700px){
.news{grid-template-columns:1fr;}
}

/* HERO */
.hero{
background:#111;
padding:15px;
border-left:4px solid red;
cursor:pointer;
}

/* CARDS */
.card{
background:#111;
padding:10px;
margin-bottom:10px;
cursor:pointer;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:#000c;
display:none;
justify-content:center;
align-items:center;
}
.box{
background:#111;
padding:20px;
max-width:700px;
max-height:80vh;
overflow:auto;
}

/* MODES */
.matrix{background:black;color:#00ff00;}
.super{filter:contrast(150%)}
</style>
</head>

<body>

<!-- SETUP -->
<div id="setup">
<h2>Configurar IA</h2>

<select id="vel">
<option value="rapido">⚡ Rápido</option>
<option value="normal" selected>⚖️ Normal</option>
<option value="detalhado">🧠 Detalhado</option>
</select>

<select id="linhas">
<option value="10">10 linhas</option>
<option value="20" selected>20 linhas</option>
<option value="40">40 linhas</option>
</select>

<button onclick="start()">Entrar</button>
</div>

<header>
<div class="logo" onclick="logoClick()">VCtv <span>AInews</span></div>
<button onclick="loadNews()">Atualizar</button>
</header>

<div class="controls">
<input id="tema" placeholder="Tema personalizado">
<button onclick="custom()">Gerar</button>
</div>

<div id="news" class="news"></div>

<div id="modal" class="modal" onclick="closeModal()">
<div class="box" id="box"></div>
</div>

<script>

let config={vel:"normal",linhas:20};
let noticias=[];

function start(){
config.vel=document.getElementById("vel").value;
config.linhas=document.getElementById("linhas").value;
document.getElementById("setup").style.display="none";
loadNews();
}

/* LOAD */
async function loadNews(){
let all=[];
try{
let feeds=[
"https://g1.globo.com/rss/g1/",
"https://feeds.bbci.co.uk/portuguese/rss.xml"
];

for(let f of feeds){
let r=await fetch("https://api.allorigins.win/get?url="+encodeURIComponent(f));
let d=await r.json();
let xml=new DOMParser().parseFromString(d.contents,"text/xml");

[...xml.querySelectorAll("item")].slice(0,5).forEach(i=>{
all.push({
title:i.querySelector("title").textContent,
desc:i.querySelector("description").textContent
});
});
}
}catch{}

if(!all.length){
all=[{title:"Erro ao carregar",desc:"Tente novamente"}];
}

noticias=all;
render();
}

/* RENDER */
function render(){
let hero=noticias[0];
let side=noticias.slice(1,6);

document.getElementById("news").innerHTML=`
<div class="hero" onclick="openNews(0)">
<h2>${hero.title}</h2>
<p>${hero.desc}</p>
</div>

<div>
${side.map((n,i)=>`
<div class="card" onclick="openNews(${i+1})">
<b>${n.title}</b>
<p>${n.desc.substring(0,100)}</p>
</div>`).join("")}
</div>
`;
}

/* IA */
async function gerarIA(t,d){

let prompt=`
Notícia em português do Brasil.

Tema: ${t}
Contexto: ${d}

mínimo ${config.linhas} linhas
${config.vel==="rapido"?"resumo direto":config.vel==="detalhado"?"explicação profunda":"equilibrado"}

sem mudar idioma
sem repetir frases
`;

for(let i=0;i<3;i++){
try{
let r=await fetch("https://text.pollinations.ai/"+encodeURIComponent(prompt));
let txt=await r.text();

if(txt.includes("IMPORTANT")||txt.length<100) continue;
if(/[一-龯]/.test(txt)) continue;

return txt;
}catch{}
}
return "Erro ao gerar.";
}

/* OPEN */
async function openNews(i){
let n=noticias[i];

document.getElementById("modal").style.display="flex";
document.getElementById("box").innerHTML="Gerando...";

let txt=await gerarIA(n.title,n.desc);

document.getElementById("box").innerHTML=`
<h2>${n.title}</h2>
<p>${txt}</p>
<button onclick="closeModal()">Fechar</button>
`;
}

/* CUSTOM */
function custom(){
let t=document.getElementById("tema").value;
if(!t)return;

noticias.unshift({title:t,desc:"Gerado por IA"});
render();
openNews(0);
}

/* MODAL */
function closeModal(){
document.getElementById("modal").style.display="none";
}

/* EASTER EGGS */
let seq="";
document.addEventListener("keydown",e=>{
seq+=e.key;
if(seq.includes("vctv")){
alert("Modo secreto 😎");
seq="";
}
if(e.key==="m")document.body.classList.toggle("matrix");
if(e.shiftKey&&e.key==="V")document.body.classList.toggle("super");
});

let clicks=0;
function logoClick(){
clicks++;
if(clicks>=7){
document.body.style.filter="hue-rotate(120deg)";
setTimeout(()=>document.body.style.filter="",1000);
clicks=0;
}
}

</script>

</body>
</html>
