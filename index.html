<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>VCtv AInews V5 FAST</title>

<style>
body{
  background:#0b0b0b;
  color:#eee;
  font-family:Georgia, serif;
  margin:0;
}

/* HEADER */
header{
  border-bottom:3px solid #cc0000;
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

/* GRID */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

.hero{
  font-size:28px;
  font-weight:bold;
  border-bottom:2px solid red;
  padding-bottom:10px;
  cursor:pointer;
}

.card{
  border-bottom:1px solid #222;
  padding:12px 0;
  cursor:pointer;
}

/* LOADING */
.skeleton{
  background:#1a1a1a;
  height:20px;
  margin:10px 0;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  50%{opacity:.4;}
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#000c;
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#111;
  padding:30px;
  max-width:700px;
  max-height:80vh;
  overflow:auto;
}
</style>
</head>

<body>

<header>VCtv AInews ⚡ FAST</header>

<div class="container">
  <div id="news" class="grid"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
const FEEDS = [
  "https://g1.globo.com/rss/g1/",
  "https://feeds.bbci.co.uk/portuguese/rss.xml",
  "https://g1.globo.com/rss/g1/tecnologia/"
];

let news = [];

/* ⚡ MOSTRA IMEDIATO */
showSkeleton();

/* ⚡ CARREGA DEPOIS */
setTimeout(loadFastNews, 50);

function showSkeleton(){
  document.getElementById("news").innerHTML = `
    <div>
      <div class="skeleton" style="height:40px"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
    <div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  `;
}

/* 🚀 CARREGAMENTO RÁPIDO */
async function loadFastNews(){
  let all = [];

  for(let url of FEEDS){
    try{
      const res = await fetch("https://api.allorigins.win/get?url="+encodeURIComponent(url));
      const data = await res.json();

      const xml = new DOMParser().parseFromString(data.contents,"text/xml");

      const items = [...xml.querySelectorAll("item")].slice(0,3);

      items.forEach(i=>{
        all.push({
          title: i.querySelector("title").textContent,
          desc: i.querySelector("description").textContent,
        });
      });

    }catch(e){}
  }

  news = all.slice(0,8);
  render();
}

/* 🎨 RENDER */
function render(){
  const hero = news[0];
  const rest = news.slice(1);

  document.getElementById("news").innerHTML = `
    <div>
      <div class="hero" onclick="openNews(0)">
        ${hero.title}
      </div>
      <p>${hero.desc.slice(0,200)}...</p>
    </div>

    <div>
      ${rest.map((n,i)=>`
        <div class="card" onclick="openNews(${i+1})">
          ${n.title}
        </div>
      `).join("")}
    </div>
  `;
}

/* 🧠 IA SÓ AO ABRIR (RÁPIDO) */
async function openNews(i){
  const n = news[i];

  document.getElementById("modal").style.display="flex";
  document.getElementById("modalContent").innerHTML="⏳ Gerando matéria...";

  const prompt = `
  Escreva uma notícia jornalística completa com no mínimo 20 linhas sobre:
  ${n.title}
  Tom profissional, estilo jornal.
  `;

  try{
    const res = await fetch("https://text.pollinations.ai/"+encodeURIComponent(prompt));
    const text = await res.text();

    document.getElementById("modalContent").innerHTML = "<p>"+text.replace(/\n/g,"</p><p>")+"</p>";

  }catch{
    document.getElementById("modalContent").innerHTML="Erro ao gerar.";
  }
}

/* FECHAR */
document.getElementById("modal").onclick = () =>
  document.getElementById("modal").style.display="none";
</script>

</body>
</html>
