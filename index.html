<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VCtv AInews</title>
<meta name="theme-color" content="#070707" />
<style>
  :root{
    --bg:#070707;
    --bg2:#0d0d0d;
    --card:#111113;
    --card2:#151518;
    --line:#232326;
    --line2:#2b2b31;
    --text:#ebebeb;
    --muted:#8b8b8b;
    --muted2:#666;
    --red:#d10000;
    --gold:#f0b429;
    --green:#60c16b;
    --blue:#5d8cff;
    --cyan:#55d7ff;
    --serif: Georgia, "Times New Roman", serif;
    --display: Georgia, "Times New Roman", serif;
    --sans: Arial, Helvetica, sans-serif;
    --radius:16px;
    --radius2:18px;
    --shadow:0 14px 44px rgba(0,0,0,.38);
    --shadow2:0 24px 80px rgba(0,0,0,.58);
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%;background:var(--bg);color:var(--text);font-family:var(--serif)}
  body{overflow-x:hidden}
  a{color:inherit}
  button,input,select,textarea{font:inherit}
  img{max-width:100%;display:block}
  ::selection{background:rgba(209,0,0,.35)}

  .topbar{
    position:sticky;top:0;z-index:1000;
    background:rgba(7,7,7,.96);
    backdrop-filter:blur(10px);
    border-bottom:1px solid #121212;
  }

  .brand-row{
    display:flex;justify-content:space-between;align-items:center;gap:16px;
    padding:12px 18px;border-bottom:1px solid #141414;
  }

  .brand{
    display:flex;align-items:center;gap:12px;min-width:0;
  }

  .brand-badge{
    background:var(--red);color:#fff;border-radius:6px;padding:5px 8px;
    font-family:var(--sans);font-size:12px;font-weight:900;letter-spacing:1.4px;
  }

  .brand-name{
    font-family:var(--sans);font-size:22px;font-weight:900;letter-spacing:1px;color:#fff;white-space:nowrap;
  }
  .brand-name span{color:var(--red)}
  .brand-sub{font-size:11px;color:var(--muted);font-family:var(--sans);margin-top:2px}

  .right-meta{
    display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end
  }

  .edition{
    font-family:var(--sans);font-size:10px;font-weight:900;letter-spacing:1.4px;text-transform:uppercase;
    padding:5px 10px;border-radius:999px;border:1px solid #2a2a2a;background:#111;color:#bbb;
    cursor:pointer;user-select:none;
  }
  .edition.daily{color:var(--green);border-color:#214028;background:#0f1510}
  .edition.weekend{color:var(--blue);border-color:#24335c;background:#10131a}
  .edition.special{color:var(--gold);border-color:#4a3900;background:#171200}
  #dateDisplay{font-size:11px;color:var(--muted);font-family:var(--sans)}

  .progress-wrap{
    height:3px;background:#111;position:relative;overflow:hidden
  }
  #scrollProgress{
    width:0%;height:100%;background:linear-gradient(90deg,var(--red),#ff5e5e);transition:width .08s linear
  }

  .toolbar{
    display:flex;gap:10px;align-items:center;flex-wrap:wrap;
    padding:10px 18px;background:#0a0a0a;border-bottom:1px solid #151515;
  }

  .select,.input,.btn{
    border-radius:999px;border:1px solid #2a2a2a;background:#121212;color:#ddd;
    padding:10px 14px;font-family:var(--sans);font-size:12px;font-weight:700;outline:none;
  }
  .select{min-width:210px}
  .input{flex:1;min-width:220px;color:#eee;font-weight:600}
  .input::placeholder{color:#5a5a5a}
  .btn{
    background:linear-gradient(180deg,#d10000,#ae0000);
    border-color:#b30000;color:#fff;cursor:pointer;transition:.18s transform,.18s opacity;
    box-shadow:0 10px 24px rgba(209,0,0,.18);
  }
  .btn.secondary{background:#141414;border-color:#2a2a2a;box-shadow:none}
  .btn:hover{transform:translateY(-1px)}
  .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

  .ticker{
    overflow:hidden;white-space:nowrap;background:var(--red);color:#fff;border-bottom:1px solid rgba(255,255,255,.1);
    cursor:pointer;user-select:none
  }
  .ticker-inner{
    display:inline-block;padding:6px 0;font-family:var(--sans);font-size:11px;font-weight:800;letter-spacing:.4px;
    animation:ticker 54s linear infinite;
  }
  @keyframes ticker{
    from{transform:translateX(100vw)}
    to{transform:translateX(-100%)}
  }

  .container{max-width:1320px;margin:0 auto;padding:18px 16px 28px}

  .status{
    margin:0 0 12px;
    font-family:var(--sans);font-size:11px;color:#9a9a9a;
    padding:9px 12px;border-left:3px solid var(--red);background:#0d0d0d;border-radius:8px
  }

  .brief-strip{
    margin:0 0 14px;
    border:1px solid #232326;
    border-radius:14px;
    background:linear-gradient(180deg,#101010,#0c0c0c);
    padding:10px 12px;
    display:grid;
    gap:6px;
    box-shadow:var(--shadow);
  }
  .brief-head{
    display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
    font-family:var(--sans);font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--red);
  }
  .brief-text{
    font-family:var(--serif);
    color:#ddd;
    line-height:1.6;
    font-size:13px;
  }

  .tabs{
    display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px
  }
  .tab{
    border:1px solid #262626;background:#101010;color:#8b8b8b;
    padding:8px 12px;border-radius:999px;font-size:11px;font-family:var(--sans);font-weight:800;
    letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:.18s;
  }
  .tab:hover{color:#fff;border-color:#3a3a3a}
  .tab.active{background:var(--red);color:#fff;border-color:var(--red)}

  .tools{
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px
  }
  .tools .small{
    font-family:var(--sans);font-size:11px;color:#8a8a8a
  }

  .layout{
    display:grid;grid-template-columns:1.7fr .95fr;gap:22px;align-items:start;
  }
  @media (max-width: 980px){
    .layout{grid-template-columns:1fr}
  }
  .panel{min-width:0}

  .logo-panel{
    background:linear-gradient(180deg,#18c85f,#11b955);
    border-radius:18px;
    padding:18px 18px 22px;
    box-shadow:var(--shadow);
    border:1px solid rgba(255,255,255,.14);
    position:relative;
    overflow:hidden;
    margin-bottom:16px;
    cursor:pointer;
    user-select:none;
  }
  .logo-panel::before{
    content:"";
    position:absolute;inset:0;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,.08), transparent 24%),
      radial-gradient(circle at 85% 15%, rgba(255,255,255,.08), transparent 20%),
      radial-gradient(circle at 95% 70%, rgba(255,255,255,.06), transparent 28%);
    pointer-events:none;
  }
  .logo-mini{
    position:absolute;top:14px;left:14px;
    background:rgba(0,0,0,.15);
    color:#fff;padding:5px 8px;border-radius:999px;
    font-family:var(--sans);font-size:10px;font-weight:900;letter-spacing:1.2px;text-transform:uppercase
  }
  .logo-media{
    position:relative;
    width:100%;
    display:grid;
    place-items:center;
    min-height:210px;
  }
  .logo-image{
    width:min(820px,100%);
    max-height:220px;
    object-fit:contain;
    filter:drop-shadow(0 4px 14px rgba(0,0,0,.14));
    display:block;
  }
  .logo-fallback{
    width:100%;
    display:grid;
    place-items:center;
  }
  .logo-top{
    display:flex;justify-content:center;gap:18px;flex-wrap:wrap;align-items:center;margin-bottom:10px;
    filter:drop-shadow(0 2px 0 rgba(0,0,0,.12));
  }
  .logo-icon{
    width:36px;height:36px;border:3px solid #111;border-radius:7px;position:relative;background:rgba(255,255,255,.02)
  }
  .logo-icon.phone::before,
  .logo-icon.phone::after{
    content:"";position:absolute;left:50%;transform:translateX(-50%);background:#111;border-radius:2px
  }
  .logo-icon.phone::before{top:4px;width:18px;height:2px}
  .logo-icon.phone::after{bottom:4px;width:12px;height:2px}
  .logo-icon.camera{
    border-radius:10px;transform:rotate(-12deg);width:46px;height:34px
  }
  .logo-icon.camera::before{
    content:"";position:absolute;top:8px;left:6px;width:26px;height:16px;border:3px solid #111;border-radius:50%
  }
  .logo-icon.mic{
    width:26px;height:40px;border:none
  }
  .logo-icon.mic::before{
    content:"";position:absolute;left:50%;top:0;transform:translateX(-50%);
    width:16px;height:24px;border:3px solid #111;border-radius:12px 12px 14px 14px
  }
  .logo-icon.mic::after{
    content:"";position:absolute;left:50%;bottom:0;transform:translateX(-50%);
    width:3px;height:14px;background:#111;box-shadow:0 0 0 1px #111
  }
  .logo-icon.news{
    width:50px;height:34px;transform:rotate(12deg);border-radius:6px
  }
  .logo-icon.news::before{
    content:"";position:absolute;left:7px;top:7px;right:7px;bottom:7px;
    background:
      linear-gradient(#111,#111) 0 0/100% 3px no-repeat,
      linear-gradient(#111,#111) 0 8px/100% 3px no-repeat,
      linear-gradient(#111,#111) 0 16px/100% 3px no-repeat;
  }
  .logo-icon.news::after{
    content:"";position:absolute;right:6px;bottom:6px;width:9px;height:9px;border:3px solid #111
  }
  .logo-icon.glob{
    width:42px;height:42px;border-radius:50%;
    background:
      radial-gradient(circle at 50% 50%, transparent 0 6px, transparent 6px),
      linear-gradient(#111,#111) 0 50%/100% 3px no-repeat,
      linear-gradient(#111,#111) 50% 0/3px 100% no-repeat;
  }
  .logo-icon.glob::before,
  .logo-icon.glob::after{
    content:"";position:absolute;border:3px solid #111;border-radius:50%;inset:0
  }
  .logo-icon.glob::after{inset:7px 0}
  .logo-word{
    text-align:center;
    font-family:var(--sans);
    font-weight:900;
    font-size:82px;
    line-height:0.9;
    color:#fff;
    letter-spacing:-4px;
    text-shadow:0 3px 12px rgba(0,0,0,.14);
  }
  @media (max-width:700px){
    .logo-word{font-size:60px}
  }
  .logo-tagline{
    text-align:center;
    font-family:var(--sans);
    color:#f4fff5;
    font-size:22px;
    line-height:1.15;
    margin-top:10px;
    text-shadow:0 2px 10px rgba(0,0,0,.12);
  }
  @media (max-width:700px){
    .logo-tagline{font-size:17px}
  }

  .hero{
    background:linear-gradient(180deg,#131316,#0f0f11);
    border:1px solid #232326;border-radius:18px;overflow:hidden;box-shadow:var(--shadow);
  }
  .hero-inner{padding:24px 24px 20px}
  .kicker{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    font-family:var(--sans);font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;
    color:var(--red);margin-bottom:10px
  }
  .kicker .dot{width:5px;height:5px;border-radius:50%;background:var(--red);display:inline-block}
  .hero h1{
    font-family:var(--display);font-size:40px;line-height:1.08;margin:0 0 12px;color:#fff
  }
  @media (max-width: 700px){
    .hero h1{font-size:31px}
  }
  .hero-lead{
    font-size:16px;line-height:1.9;color:#d5d5d5;margin-top:14px
  }
  .hero-lead p{margin:0 0 10px}
  .hero-meta{
    font-size:11px;font-family:var(--sans);color:#8b8b8b;border-top:1px solid #212126;padding-top:10px;margin-top:12px
  }

  .cards{
    margin-top:18px;
    display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1px;
    background:#1e1e1e;border:1px solid #1e1e1e;border-radius:16px;overflow:hidden;
  }
  @media (max-width: 1020px){
    .cards{grid-template-columns:repeat(2,minmax(0,1fr))}
  }
  @media (max-width: 650px){
    .cards{grid-template-columns:1fr}
  }

  .story-card,.card,.rail-item{
    background:var(--card);padding:18px;cursor:pointer;transition:.18s background,.18s transform;
    display:flex;flex-direction:column;gap:8px;position:relative;
  }
  .story-card:hover,.card:hover,.rail-item:hover{background:#17171a;transform:translateY(-1px)}
  .story-cat{
    font-family:var(--sans);font-size:9px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--red)
  }
  .story-title{
    font-family:var(--display);font-size:18px;line-height:1.35;color:#efefef;font-weight:700
  }
  .story-excerpt{
    font-size:13px;line-height:1.65;color:#9e9e9e;flex:1
  }
  .story-meta{
    display:flex;justify-content:space-between;gap:10px;align-items:center;
    border-top:1px solid #1f1f1f;padding-top:9px;font-family:var(--sans);font-size:10px;color:#666
  }

  .fav-btn{
    position:absolute;top:14px;right:14px;
    border:none;background:#111;color:#bbb;width:30px;height:30px;border-radius:50%;
    cursor:pointer;font-weight:900;display:grid;place-items:center;border:1px solid #2a2a2a
  }
  .fav-btn.on{color:#ffd66c;border-color:#5b4810;background:#1a1407}

  .rail{
    background:linear-gradient(180deg,#0f0f11,#0c0c0d);
    border:1px solid #222;border-radius:18px;padding:16px;box-shadow:var(--shadow);
    position:sticky;top:146px;
  }
  @media (max-width: 980px){
    .rail{position:static}
  }
  .rail-title{
    font-family:var(--sans);font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;
    color:#a1a1a1;border-bottom:1px solid #1f1f1f;padding-bottom:8px;margin-bottom:10px
  }
  .rail-item{
    display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #181818;
  }
  .rail-item:last-child{border-bottom:none}
  .rail-num{
    min-width:34px;font-family:var(--display);font-size:28px;line-height:1;color:#2c2c2c;font-weight:900
  }
  .rail-info{min-width:0}
  .rail-cat{
    font-family:var(--sans);font-size:9px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--red);margin-bottom:4px
  }
  .rail-title-text{
    font-family:var(--display);font-size:15px;line-height:1.34;color:#dedede;margin-bottom:4px
  }
  .rail-excerpt{
    font-size:12px;line-height:1.55;color:#8a8a8a
  }
  .rail-meta{
    margin-top:5px;font-size:10px;font-family:var(--sans);color:#666
  }

  .section-divider{
    display:flex;align-items:center;gap:12px;margin:22px 0 14px;
  }
  .section-divider::before,.section-divider::after{
    content:"";height:1px;background:#1f1f1f;flex:1
  }
  .section-label{
    font-family:var(--sans);font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--red);white-space:nowrap
  }

  .empty{
    padding:24px;border:1px dashed #2a2a2a;border-radius:14px;color:#888;font-family:var(--sans);background:#0e0e0e
  }
  .skeleton{
    background:linear-gradient(90deg,#19191b,#242428,#19191b);
    background-size:200% 100%;
    animation:shimmer 1.2s linear infinite;
    border-radius:14px;
    min-height:160px
  }
  @keyframes shimmer{
    0%{background-position:200% 0}
    100%{background-position:-200% 0}
  }

  .modal-overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;overflow:auto;padding:24px
  }
  .modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
  .modal{
    width:100%;max-width:860px;margin:auto;background:#0f0f10;border:1px solid #2c2c31;border-radius:18px;
    box-shadow:0 30px 100px rgba(0,0,0,.6);padding:26px
  }
  .modal h2{
    font-family:var(--display);font-size:32px;line-height:1.14;margin:0 0 10px;color:#fff
  }
  .modal-meta{
    font-family:var(--sans);font-size:11px;color:#8a8a8a;border-bottom:1px solid #1f1f1f;padding-bottom:14px;margin-bottom:18px
  }
  .modal-meta a{color:var(--red);text-decoration:none}
  .modal-body{
    font-size:16px;line-height:1.95;color:#d7d7d7
  }
  .modal-body p{margin:0 0 14px}
  .modal-actions{
    display:flex;justify-content:flex-end;gap:10px;margin-top:22px;flex-wrap:wrap
  }
  .close-btn{
    border:1px solid #2c2c2c;background:#151515;color:#ccc;border-radius:999px;padding:9px 16px;cursor:pointer
  }
  .close-btn:hover{background:#1a1a1a}
  .loader{
    display:flex;align-items:center;gap:10px;color:#8e8e8e;font-family:var(--sans);font-size:13px;padding:10px 0
  }
  .spinner{
    width:20px;height:20px;border-radius:50%;border:2px solid #2a2a2a;border-top-color:var(--red);animation:spin .8s linear infinite
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  .egg-badge{
    display:inline-flex;align-items:center;gap:8px;
    padding:8px 12px;border-radius:999px;background:#121212;color:#ddd;border:1px solid #272727;
    font-family:var(--sans);font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase
  }
  .secret{
    background:linear-gradient(180deg,#111,#0c0c0c);
    border:1px solid #2d2d16;
    box-shadow:0 0 0 1px rgba(240,180,41,.08), var(--shadow);
  }

  .print-mode{
    background:#f4f1ea;
    color:#111;
  }
  .print-mode .topbar,
  .print-mode .ticker{
    background:#111;
    color:#fff;
  }
  .print-mode .logo-panel,
  .print-mode .hero,
  .print-mode .cards,
  .print-mode .rail,
  .print-mode .modal{
    border-radius:0;
    background:#fff;
    border-color:#ddd;
    box-shadow:none;
  }
  .print-mode .story-title,
  .print-mode .rail-title-text,
  .print-mode .modal h2,
  .print-mode .hero h1{
    color:#111;
  }
  .print-mode .story-excerpt,
  .print-mode .rail-excerpt,
  .print-mode .hero-lead,
  .print-mode .modal-body{
    color:#333;
  }

  footer{
    margin-top:26px;padding:20px 14px 30px;text-align:center;color:#555;font-family:var(--sans);font-size:11px;border-top:1px solid #141414;
    cursor:pointer;
  }
  footer span{color:var(--red)}

  .sr-only{
    position:absolute;
    width:1px;height:1px;
    padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;
  }

  .audio-pill{
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 10px;border-radius:999px;background:#121212;border:1px solid #262626;
    font-family:var(--sans);font-size:11px;color:#d0d0d0;cursor:pointer;user-select:none
  }
  .audio-pill.on{border-color:#3b6;background:#122018;color:#bfecc8}
  .mini-note{
    font-family:var(--sans);font-size:10px;color:#777;margin-top:4px
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand-row">
    <div class="brand">
      <span class="brand-badge">VC</span>
      <div>
        <div class="brand-name">VCtv <span>AI</span>news</div>
        <div class="brand-sub">Estilo jornal • rápido • estável • com logo e easter egg</div>
      </div>
    </div>

    <div class="right-meta">
      <span id="editionBadge" class="edition daily">EDIÇÃO DIÁRIA</span>
      <span id="dateDisplay"></span>
    </div>
  </div>

  <div class="progress-wrap"><div id="scrollProgress"></div></div>

  <div class="toolbar">
    <select id="modelSelect" class="select" onchange="setModel(this.value)">
      <option value="haiku">⚡ Haiku — rápido</option>
      <option value="sonnet" selected>✦ Sonnet — equilibrado</option>
      <option value="opus">◈ Opus — detalhado</option>
      <option value="extended">⊞ Estendido — muito longo</option>
    </select>

    <select id="styleSelect" class="select" onchange="setStyle(this.value)">
      <option value="reportagem" selected>📰 Reportagem</option>
      <option value="urgente">🚨 Urgente</option>
      <option value="analitica">🔎 Analítica</option>
      <option value="investigativa">🕵️ Investigativa</option>
      <option value="editorial">✍️ Editorial</option>
      <option value="popular">💬 Popular</option>
    </select>

    <select id="sizeSelect" class="select" onchange="setSize(this.value)">
      <option value="short">Curta</option>
      <option value="medium" selected>Média</option>
      <option value="long">Longa</option>
      <option value="mega">Mega longa</option>
    </select>

    <input id="topicInput" class="input" type="text" placeholder="Gerar notícia sobre qualquer tema..." />
    <button class="btn" id="genBtn" onclick="createCustomStory()">Gerar notícia</button>
    <button class="btn secondary" id="refreshBtn" onclick="refreshNews(true)">Atualizar</button>
    <button class="btn secondary" id="cacheBtn" onclick="clearCacheNow()">Limpar cache</button>
  </div>

function hashKey(str){

  return String(h);
}
function dedupeArticles(items){
  const seen = new Set();
  const out = [];
  for(const item of items){
    const key = `${(item.title || "").toLowerCase()}|${(item.link || "").toLowerCase()}`;
    if(seen.has(key)) continue;
    seen.add(key);
    out.push(item);

function paragraphsFromText(text){
  let paras = String(text || "").split(/\n\s*\n/).map(p => p.trim()).filter(Boolean);
  if(paras.length <= 1){
    const sentences = String(text || "").match(/[^.!?]+[.!?]+/g);
    if(sentences && sentences.length > 1){
      paras = [];
      for(let i = 0; i < sentences.length; i += 3){
        paras.push(sentences.slice(i, i + 3).join(" ").trim());
      }
    }
  }
  return paras.filter(Boolean);
}
function buildParagraphHtml(text){

async function fetchWithTimeout(url, options = {}, timeout = 8000){
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  try{
    return await fetch(url, { ...options, signal: controller.signal });
  }finally{
    clearTimeout(timer);
  }
}
async function fetchTextWithFallbacks(url, timeout = 8000){
  try{
    const r = await fetchWithTimeout(url, {}, timeout);
    if(r.ok) return await r.text();
  }catch{}

  try{
    const p1 = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const r = await fetchWithTimeout(p1, {}, timeout);
    const text = await r.text();
    try{
      const j = JSON.parse(text);
      if(j.contents) return j.contents;
      if(j.data) return j.data;
    }catch{}
    return text;
  }catch{}

  try{
    const p2 = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`;
    const r = await fetchWithTimeout(p2, {}, timeout);
    return await r.text();
  }catch{}
  return null;
}

function buildFreshPrompt(topic, category, preset, sourceContext = ""){

  const seed = Math.floor(Math.random() * 9999999);
  const url = `https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=${encodeURIComponent(preset.id)}&seed=${seed}&temperature=${temperature}&nologo=true`;
  const text = await fetchTextWithFallbacks(url, preset.timeout);
  return (text || "").replace(/```json|```/g,"").trim();
}
function parseLooseJson(text){
  try{
    const clean = String(text || "").replace(/```json|```/g,"").trim();
    const start = clean.indexOf("{");
    const end = clean.lastIndexOf("}");
    if(start >= 0 && end > start) return JSON.parse(clean.slice(start, end + 1));
  }catch{}
  return null;
}

function currentArticle(){

function articlePlainText(article){
  const title = article?.title || "";
  const summary = article?.summary || "";
  const content = article?.content || "";
  return `${title}\n\n${summary}\n\n${content}`.trim();
}
function copyArticle(){
  const a = currentArticle();

  const text = articlePlainText(a);
  navigator.clipboard?.writeText(text).then(() => {
    setStatus("✅ Texto copiado para a área de transferência");
  }).catch(() => {
    alert("Não foi possível copiar.");
  });
}
function shareCurrent(){
  const a = currentArticle();

  const url = location.href.split("#")[0] + `#a=${a.key}`;
  const payload = {
    title: a.title,
    text: a.summary || a.title,
    url
  };
  if(navigator.share){
    navigator.share(payload).catch(()=>{});
  }else{
    navigator.clipboard?.writeText(`${payload.title}\n${payload.url}`).then(()=>{
      setStatus("✅ Link compartilhável copiado");
    }).catch(()=> alert("Não foi possível compartilhar."));
  }
}

function speakArticle(){
  const a = currentArticle();
  if(!a || !("speechSynthesis" in window)) return;
  stopVoice();
  const text = articlePlainText(a).replace(/\s+/g," ").slice(0, 6000);
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "pt-BR";
  u.rate = 1.0;
  u.pitch = 1.0;
  u.onend = () => {
    state.voiceOn = false;
    localStorage.setItem("vctv_voice_on", JSON.stringify(false));
    document.getElementById("voiceToggleBtn").textContent = "Ler em voz";
  };
  voiceUtterance = u;
  speechSynthesis.speak(u);
}
function stopVoice(){
  if("speechSynthesis" in window) speechSynthesis.cancel();
  voiceUtterance = null;
  state.voiceOn = false;
  localStorage.setItem("vctv_voice_on", JSON.stringify(false));
  document.getElementById("voiceToggleBtn").textContent = "Ler em voz";
}

/* fontes */
async function fetchGDELTCategory(cat){
  const url = `https://api.gdeltproject.org/api/v2/doc/doc?query=${encodeURIComponent(cat.query)}&mode=ArtList&format=rss&lastminutes=${LAST_MINUTES}`;
  const xmlText = await fetchTextWithFallbacks(url, 8000);
  if(!xmlText) return [];

  const xml = new DOMParser().parseFromString(xmlText, "text/xml");
  if(xml.querySelector("parsererror")) return [];

  const items = [...xml.querySelectorAll("item")].slice(0, 4);
  return items.map(item => {
    const title = stripHtml(item.querySelector("title")?.textContent || "");
    const desc = stripHtml(item.querySelector("description")?.textContent || "");
    const link = item.querySelector("link")?.textContent?.trim() || "";
    const pubDate = item.querySelector("pubDate")?.textContent || Date.now();
    return normalizeArticle({
      title: title || "Notícia sem título",
      summary: desc || teaserFor({ title, category: cat.key }),
      link,
      date: new Date(pubDate),
      source: `GDELT · ${cat.label}`,
      category: cat.key,
      emoji: cat.emoji,
      content: null,
      related: []
    });
  }).filter(a => a.title.length > 6);
}
async function fetchRSSFallback(feed){
  try{
    const proxies = [
      `https://api.allorigins.win/get?url=${encodeURIComponent(feed.url)}`,
      `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(feed.url)}`
    ];
    for(const p of proxies){
      try{
        const text = await fetchTextWithFallbacks(p, 8000);
        if(!text) continue;
        const payload = (() => { try { return JSON.parse(text); } catch { return null; } })();
        const xmlText = payload?.contents || payload?.data || text;
        const xml = new DOMParser().parseFromString(xmlText, "text/xml");
        if(xml.querySelector("parsererror")) continue;

        const items = [...xml.querySelectorAll("item")].slice(0, 3);
        const mapped = items.map(item => {
          const title = stripHtml(item.querySelector("title")?.textContent || "");
          const desc = stripHtml(item.querySelector("description")?.textContent || "");
          const link = item.querySelector("link")?.textContent?.trim() || "";
          const pubDate = item.querySelector("pubDate")?.textContent || Date.now();
          return normalizeArticle({
            title,
            summary: desc || teaserFor({ title, category: feed.key }),
            link,
            date: new Date(pubDate),
            source: `RSS · ${feed.label}`,
            category: feed.key,
            emoji: feed.emoji,
            content: null,
            related: []
          });
        }).filter(a => a.title.length > 6);
        if(mapped.length) return mapped;
      }catch{}
    }
  }catch{}
  return [];
}
async function loadCurrentArticles(){
  const coreCats = [CATEGORIES[0], CATEGORIES[1], CATEGORIES[2], CATEGORIES[4]];
  const extraCats = [CATEGORIES[3], CATEGORIES[5], CATEGORIES[6]];

  const coreResults = await Promise.allSettled(coreCats.map(fetchGDELTCategory));
  let articles = coreResults.flatMap(r => r.status === "fulfilled" ? r.value : []);
  articles = dedupeArticles(articles);

  if(articles.length < 8){

function currentArticle(){

function articlePlainText(article){
  const title = article?.title || "";

  }).catch(() => {

  });

  };

    }).catch(()=> alert("Não foi possível compartilhar."));
  }

  if(forceSpeak){
    speakArticle();
    return;
  }
  state.voiceOn = !state.voiceOn;
  localStorage.setItem("vctv_voice_on", JSON.stringify(state.voiceOn));
  document.getElementById("voiceToggleBtn").textContent = state.voiceOn ? "Parar voz" : "Ler em voz";
  if(state.voiceOn) speakArticle(); else stopVoice();
}
function speakArticle(){
  const a = currentArticle();
  if(!a || !("speechSynthesis" in window)) return;
  stopVoice();
  const text = articlePlainText(a).replace(/\s+/g," ").slice(0, 6000);
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "pt-BR";
  u.rate = 1.0;
  u.pitch = 1.0;
  u.onend = () => {
    state.voiceOn = false;
    localStorage.setItem("vctv_voice_on", JSON.stringify(false));
    document.getElementById("voiceToggleBtn").textContent = "Ler em voz";
  };
  voiceUtterance = u;
  speechSynthesis.speak(u);
}
function stopVoice(){
  if("speechSynthesis" in window) speechSynthesis.cancel();
  voiceUtterance = null;
  state.voiceOn = false;
  localStorage.setItem("vctv_voice_on", JSON.stringify(false));
  document.getElementById("voiceToggleBtn").textContent = "Ler em voz";
}

async function fetchGDELTCategory(cat){
  const url = `https://api.gdeltproject.org/api/v2/doc/doc?query=${encodeURIComponent(cat.query)}&mode=ArtList&format=rss&lastminutes=${LAST_MINUTES}`;
  const xmlText = await fetchTextWithFallbacks(url, 8000);
  if(!xmlText) return [];

  const xml = new DOMParser().parseFromString(xmlText, "text/xml");
  if(xml.querySelector("parsererror")) return [];

  const items = [...xml.querySelectorAll("item")].slice(0, 4);
  return items.map(item => {
    const title = stripHtml(item.querySelector("title")?.textContent || "");
    const desc = stripHtml(item.querySelector("description")?.textContent || "");
    const link = item.querySelector("link")?.textContent?.trim() || "";
    const pubDate = item.querySelector("pubDate")?.textContent || Date.now();
    return normalizeArticle({

async function fetchRSSFallback(feed){
  try{
    const proxies = [
      `https://api.allorigins.win/get?url=${encodeURIComponent(feed.url)}`,
      `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(feed.url)}`
    ];
    for(const p of proxies){
      try{
        const text = await fetchTextWithFallbacks(p, 8000);
        if(!text) continue;
        const payload = (() => { try { return JSON.parse(text); } catch { return null; } })();
        const xmlText = payload?.contents || payload?.data || text;
        const xml = new DOMParser().parseFromString(xmlText, "text/xml");
        if(xml.querySelector("parsererror")) continue;

        const items = [...xml.querySelectorAll("item")].slice(0, 3);
        const mapped = items.map(item => {
          const title = stripHtml(item.querySelector("title")?.textContent || "");
          const desc = stripHtml(item.querySelector("description")?.textContent || "");
          const link = item.querySelector("link")?.textContent?.trim() || "";
          const pubDate = item.querySelector("pubDate")?.textContent || Date.now();
          return normalizeArticle({
            title,
            summary: desc || teaserFor({ title, category: feed.key }),
            link,
            date: new Date(pubDate),
            source: `RSS · ${feed.label}`,
            category: feed.key,
            emoji: feed.emoji,
            content: null,
            related: []
          });
        }).filter(a => a.title.length > 6);
        if(mapped.length) return mapped;
      }catch{}
    }
  }catch{}
  return [];
}

    <p>• <strong>glitch</strong> + Enter: efeito visual oculto</p>
    <p>• <strong>666</strong> + Enter: modo obscuro</p>
    <p>• <strong>matrix</strong> + Enter: modo matriz</p>
    <p>• <strong>debug</strong> + Enter: modo debug</p>
    <p>• <strong>speed</strong> + Enter: modo turbo</p>
    <p>• <strong>print</strong> + Enter: modo impresso</p>
  `, "secret");
}
function showPlantaoSecreto(){
  const top = state.articles.slice(0, 3);
  const html = top.length
    ? top.map(a => `<p><strong>${esc(a.title)}</strong><br>${esc(a.summary || "")}</p>`).join("")
    : "<p>Sem notícias no plantão secreto.</p>";
  showModal("Plantão Secreto", `
    <p>As manchetes mais fortes do momento:</p>
    ${html}
  `, "secret");
}
function showCreditsSecretos(){
  showModal("Créditos escondidos", `
    <p>VCtv AInews — edição interativa.</p>
    <p>Feito para carregar rápido, ficar bonito e abrir notícias longas sem travar a primeira tela.</p>
    <p>Esse rodapé guardava uma pista. Agora a pista virou painel secreto.</p>
  `, "secret");
}
function triggerSecretInput(val){
  if(val === "vcpro"){
    togglePrintMode();
    showModal("Modo VC Pro", "<p>Modo editorial ativo.</p><p>O layout mudou para uma leitura mais limpa e especial.</p>", "secret");
  }else if(val === "jornal"){
    showSecretNewsroom();
  }else if(val === "glitch"){
    document.body.style.filter = "hue-rotate(240deg) contrast(1.1)";
    showModal("Glitch ativado", "<p>Pequeno efeito visual secreto ativado.</p>", "secret");
    setTimeout(() => document.body.style.filter = "", 2500);
  }else if(val === "666"){
    document.body.classList.add("print-mode");
    state.printMode = true;
    localStorage.setItem("vctv_print_mode", JSON.stringify(true));
    document.getElementById("printToggleBtn").textContent = "Sair do modo impresso";
    showModal("Modo obscuro", "<p>Uma edição escondida acabou de aparecer.</p><p>Esse é só um modo visual secreto, sem mudar o conteúdo.</p>", "secret");
  }else if(val === "matrix"){
    document.body.style.filter = "hue-rotate(90deg) saturate(1.4)";
    showModal("Matrix", "<p>Modo verde secreto ativado.</p>", "secret");
    setTimeout(() => document.body.style.filter = "", 2200);
  }else if(val === "debug"){
    showModal("Debug", `
      <p><strong>Notícias carregadas:</strong> ${state.articles.length}</p>
      <p><strong>Favoritos:</strong> ${state.favorites.size}</p>
      <p><strong>Modelo:</strong> ${state.activeModel}</p>
      <p><strong>Estilo:</strong> ${state.activeStyle}</p>
      <p><strong>Tamanho:</strong> ${state.activeSize}</p>
    `, "secret");
  }else if(val === "speed"){
    document.getElementById("tickerText").style.animationDuration = "18s";
    showModal("Turbo", "<p>O ticker ficou mais rápido por alguns segundos.</p>", "secret");
    setTimeout(()=> document.getElementById("tickerText").style.animationDuration = "54s", 3000);
  }else if(val === "print"){
    togglePrintMode();
  }
}

function showHelp(){
  showModal("Atalhos e segredos", `
    <p><strong>Atalhos úteis</strong></p>
    <p>• / ou Ctrl+K: focar busca</p>
    <p>• Esc: fechar janela</p>
    <p>• Enter na busca: testar segredos</p>
    <p><strong>Easter eggs</strong></p>
    <p>• 5 cliques na logo: Redação Secreta</p>
    <p>• 8 cliques na faixa vermelha: Plantão Secreto</p>
    <p>• 6 cliques no rodapé: Créditos Escondidos</p>
    <p>• vcpro, jornal, glitch, 666, matrix, debug, speed, print: modos ocultos</p>
  `, "secret");
}
function handleKeys(e){
  if(e.key === "Escape") closeModal();
  if(e.key === "/" && document.activeElement !== document.getElementById("searchInput")){
    e.preventDefault();
    document.getElementById("searchInput").focus();
  }
  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k"){
    e.preventDefault();
    document.getElementById("searchInput").focus();
  }
  if(e.key === "Enter" && document.activeElement === document.getElementById("searchInput")){
    const val = document.getElementById("searchInput").value.trim().toLowerCase();
    if(["vcpro","jornal","glitch","666","matrix","debug","speed","print"].includes(val)) triggerSecretInput(val);
  }
  if(e.key === "r" && !e.ctrlKey && !e.metaKey && document.activeElement !== document.getElementById("searchInput")){
    refreshNews(true);
  }
  if(e.key === "p" && !e.ctrlKey && !e.metaKey){
    togglePrintMode();
  }
  if(e.key === "f" && !e.ctrlKey && !e.metaKey){
    toggleFavoritesView();
  }
}
function showHelpIfSecretWord(){
  const val = document.getElementById("searchInput").value.trim().toLowerCase();
  if(["vcpro","jornal","glitch","666","matrix","debug","speed","print"].includes(val)) triggerSecretInput(val);
}
function clearCacheNow(){
  localStorage.removeItem(CACHE_KEY);
  localStorage.removeItem("vctv_favorites");
  localStorage.removeItem("vctv_show_favorites_only");
  location.reload();
}

/* scroll / voice / hash */
function updateScrollProgress(){
  const total = document.documentElement.scrollHeight - window.innerHeight;
  const pct = total > 0 ? (window.scrollY / total) * 100 : 0;
  document.getElementById("scrollProgress").style.width = `${Math.max(0, Math.min(100, pct))}%`;
}
function openByHash(){
  const h = location.hash || "";
  const m = h.match(/a=([^&]+)/);
  if(!m) return;
  const key = decodeURIComponent(m[1]);
  const idx = state.articles.findIndex(a => a.key === key);
  if(idx >= 0) openArticle(idx);
}
function toggleVoiceMode(forceSpeak = false){
  if(forceSpeak){
    speakArticle();
    return;
  }
  state.voiceOn = !state.voiceOn;
  localStorage.setItem("vctv_voice_on", JSON.stringify(state.voiceOn));
  document.getElementById("voiceToggleBtn").textContent = state.voiceOn ? "Parar voz" : "Ler em voz";
  if(state.voiceOn) speakArticle(); else stopVoice();
}

/* boot */
function boot(){
  document.getElementById("dateDisplay").textContent = fmtLongDate(now);
  setLogoState();
  document.getElementById("modelSelect").value = state.activeModel;
  document.getElementById("styleSelect").value = state.activeStyle;
  document.getElementById("sizeSelect").value = state.activeSize;
  document.getElementById("favToggleBtn").textContent = state.showFavoritesOnly ? "Todos" : "Favoritos";
  document.getElementById("printToggleBtn").textContent = state.printMode ? "Sair do modo impresso" : "Modo impresso";
  document.getElementById("voiceToggleBtn").textContent = state.voiceOn ? "Parar voz" : "Ler em voz";
  document.body.classList.toggle("print-mode", state.printMode);

  const cached = loadCache();
  if(cached?.length){
    state.articles = cached;
    reindexArticles();
    setStatus(`⚡ ${state.articles.length} notícias carregadas do cache`);
    render();
  }else{
    renderSkeleton();
  }

  updateTicker();
  render();
  setTimeout(() => refreshNews(false), 60);
  setInterval(updateTicker, 30000);
  document.addEventListener("keydown", handleKeys);
  window.addEventListener("scroll", updateScrollProgress);
  window.addEventListener("hashchange", openByHash);

  document.getElementById("topicInput").addEventListener("keydown", e => {
    if(e.key === "Enter") createCustomStory();
  });
  document.getElementById("searchInput").addEventListener("keydown", e => {
    if(e.key === "Enter") showHelpIfSecretWord();
  });
  document.getElementById("tickerBar").addEventListener("click", tickerTap);
  document.getElementById("editionBadge").addEventListener("click", () => {
    state.eggClicks++;
    if(state.eggClicks >= 7){
      state.eggClicks = 0;
      showModal("Edição secreta", "<p>Você achou o selo especial da redação.</p><p>Essa edição pode mudar no próximo passo.</p>", "secret");
    }
  });

  if(state.voiceOn) document.getElementById("voiceToggleBtn").textContent = "Parar voz";
  openByHash();
}
document.addEventListener("DOMContentLoaded", boot);

/* share current from buttons */
function shareCurrent(){
  const a = currentArticle();
  if(!a) return;
  const url = location.href.split("#")[0] + `#a=${a.key}`;
  const payload = { title: a.title, text: a.summary || a.title, url };
  if(navigator.share){
    navigator.share(payload).catch(()=>{});
  }else{
    navigator.clipboard?.writeText(`${payload.title}\n${payload.url}`).then(()=>{
      setStatus("✅ Link compartilhável copiado");
    }).catch(()=> alert("Não foi possível compartilhar."));
  }
}
