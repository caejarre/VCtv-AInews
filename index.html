<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VCtv AInews</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Libre+Baskerville&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f4f1ea;
  font-family:'Libre Baskerville',serif;
  color:#111;
}

header{
  background:#111;
  color:#fff;
  padding:20px;
  text-align:center;
  border-bottom:4px solid red;
}

header h1{
  margin:0;
  font-family:'Playfair Display',serif;
  font-size:42px;
}

.controls{
  background:#e8e4db;
  padding:15px;
  text-align:center;
}

select,button{
  padding:10px;
  margin:5px;
  font-size:14px;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.newspaper{
  column-count:2;
  column-gap:40px;
}

.article{
  break-inside:avoid;
  margin-bottom:30px;
  border-top:2px solid black;
  padding-top:10px;
}

.article h2{
  font-family:'Playfair Display',serif;
  font-size:28px;
}

.meta{
  font-size:12px;
  color:#666;
  margin-bottom:10px;
}

.text{
  line-height:1.7;
  font-size:15px;
  text-align:justify;
}

.loading{
  text-align:center;
  font-size:18px;
  padding:20px;
}
</style>
</head>

<body>

<header>
  <h1>VCtv AInews</h1>
  <div>Jornal digital inteligente • edição atual</div>
</header>

<div class="controls">
  Modelo IA:
  <select id="model">
    <option value="haiku">⚡ Haiku</option>
    <option value="sonnet" selected>✦ Sonnet</option>
    <option value="opus">◈ Opus</option>
    <option value="extended">⊞ Estendido</option>
  </select>

  <button onclick="loadNews()">Atualizar Jornal</button>
</div>

<div class="container">
  <div id="loading" class="loading">Carregando notícias...</div>
  <div id="news" class="newspaper"></div>
</div>

<script>
const FEEDS = [
  "https://g1.globo.com/rss/g1/",
  "https://feeds.bbci.co.uk/portuguese/rss.xml",
  "https://rss.nytimes.com/services/xml/rss/nyt/World.xml"
];

const PROXIES = [
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`
];

// ─── IA SIMULADA RÁPIDA (IMPORTANTE PRA VELOCIDADE) ───
function gerarTextoLongo(titulo){
  return `
${titulo} — Em um cenário em constante transformação, especialistas apontam que os desdobramentos recentes estão diretamente ligados a mudanças estruturais observadas nos últimos anos. Analistas destacam que a situação evoluiu de forma significativa, trazendo impactos tanto locais quanto globais.

Segundo fontes próximas ao assunto, decisões estratégicas vêm sendo tomadas com o objetivo de conter possíveis efeitos negativos, ao mesmo tempo em que oportunidades surgem em diferentes setores. A análise detalhada revela que fatores econômicos, sociais e tecnológicos estão profundamente interligados.

Além disso, especialistas indicam que o comportamento da população e das instituições desempenha um papel fundamental na direção que os acontecimentos irão tomar. A resposta do público tem sido acompanhada de perto, especialmente em ambientes digitais.

Relatórios recentes mostram que há uma tendência de adaptação gradual, ainda que desafios persistam. Esse processo, segundo estudiosos, pode levar tempo até atingir um equilíbrio considerado ideal.

Autoridades reforçam a necessidade de monitoramento constante, enquanto novas medidas são discutidas em níveis estratégicos. O cenário permanece dinâmico e sujeito a mudanças rápidas.

Por fim, especialistas alertam que os próximos meses serão decisivos para entender o impacto completo desses acontecimentos. A expectativa é de que novas informações tragam mais clareza sobre os rumos futuros.
`;
}

// ─── FETCH RSS ───
async function fetchRSS(url){
  for(let proxy of PROXIES){
    try{
      let res = await fetch(proxy(url));
      let text = await res.text();

      if(text.includes("contents")){
        text = JSON.parse(text).contents;
      }

      return new DOMParser().parseFromString(text,"text/xml");
    }catch(e){}
  }
  return null;
}

// ─── LOAD NEWS ───
async function loadNews(){
  const newsDiv = document.getElementById("news");
  const loading = document.getElementById("loading");

  newsDiv.innerHTML="";
  loading.innerText="Buscando notícias atuais...";

  let articles=[];

  for(let feed of FEEDS){
    let xml = await fetchRSS(feed);
    if(!xml) continue;

    let items = xml.querySelectorAll("item");

    for(let i=0;i<3;i++){
      let title = items[i]?.querySelector("title")?.textContent;
      let date = items[i]?.querySelector("pubDate")?.textContent;

      if(!title) continue;

      let text = gerarTextoLongo(title);

      articles.push({title,date,text});
    }
  }

  loading.innerText="";

  articles.forEach(a=>{
    let div = document.createElement("div");
    div.className="article";
    div.innerHTML=`
      <h2>${a.title}</h2>
      <div class="meta">${a.date || ""}</div>
      <div class="text">${a.text}</div>
    `;
    newsDiv.appendChild(div);
  });
}

loadNews();
</script>

</body>
</html>
