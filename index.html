<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCtv AInews</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Libre+Baskerville&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f4f1ea;
  --dark:#111;
  --accent:#c40000;
}

body{
  margin:0;
  background:var(--bg);
  color:#111;
}

/* HEADER */
header{
  background:var(--dark);
  color:#fff;
  padding:20px;
  text-align:center;
  border-bottom:4px solid var(--accent);
}

header h1{
  font-family:'Playfair Display';
  font-size:46px;
  margin:0;
}

/* LOADING SKELETON */
.skeleton{
  background:linear-gradient(90deg,#ddd,#eee,#ddd);
  height:120px;
  margin-bottom:20px;
  border-radius:6px;
  animation:load 1.2s infinite;
}

@keyframes load{
  0%{opacity:.6}
  50%{opacity:1}
  100%{opacity:.6}
}

/* CONTAINER */
.container{
  max-width:1300px;
  margin:auto;
  padding:20px;
}

/* HERO */
.hero{
  margin-bottom:30px;
  border-bottom:3px solid #000;
  padding-bottom:20px;
}

.hero h2{
  font-family:'Playfair Display';
  font-size:42px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:2fr 1fr 1fr;
  gap:25px;
}

/* ARTICLE */
.article{
  border-top:2px solid #000;
  padding-top:10px;
}

.article h3{
  font-family:'Playfair Display';
}

.text{
  font-family:'Libre Baskerville';
  line-height:1.7;
  text-align:justify;
  font-size:15px;
}

.meta{
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<header>
  <h1>VCtv AInews</h1>
  <div>Edição atual • Jornal digital</div>
</header>

<div class="container">

  <div id="hero"></div>

  <div class="grid">
    <div id="main"></div>
    <div id="side1"></div>
    <div id="side2"></div>
  </div>

</div>

<script>
const FEEDS=[
 "https://g1.globo.com/rss/g1/",
 "https://feeds.bbci.co.uk/portuguese/rss.xml"
];

const PROXIES=[
 url=>`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
 url=>`https://corsproxy.io/?${encodeURIComponent(url)}`
];

// TEXTO LONGO REALISTA
function textoLongo(t){
return `
${t} — O cenário atual demonstra mudanças significativas que vêm sendo analisadas por especialistas em diversas áreas. Nos últimos dias, novas informações reforçaram a relevância do tema, ampliando o debate público.

Segundo análises recentes, fatores econômicos e sociais influenciam diretamente os acontecimentos, criando um ambiente de incerteza, mas também de oportunidades. A situação segue em evolução constante.

Autoridades acompanham o caso de perto, enquanto decisões estratégicas são discutidas. A população reage com atenção às atualizações divulgadas diariamente.

Relatórios indicam que os impactos podem ser sentidos tanto a curto quanto a longo prazo, afetando diferentes setores. A expectativa é de que novas medidas sejam implementadas.

Especialistas destacam a importância da cooperação entre instituições e da transparência na comunicação. Isso ajuda a reduzir riscos e orientar melhor a sociedade.

Nos próximos meses, o desenvolvimento do cenário será determinante para entender as consequências reais e possíveis soluções.
`;
}

// FETCH RSS
async function fetchRSS(url){
 for(let p of PROXIES){
  try{
   let r=await fetch(p(url));
   let t=await r.text();
   if(t.includes("contents")) t=JSON.parse(t).contents;
   return new DOMParser().parseFromString(t,"text/xml");
  }catch{}
 }
 return null;
}

// LOAD
async function load(){
 const hero=document.getElementById("hero");
 const main=document.getElementById("main");
 const s1=document.getElementById("side1");
 const s2=document.getElementById("side2");

 hero.innerHTML='<div class="skeleton"></div>';
 main.innerHTML='<div class="skeleton"></div>';
 s1.innerHTML='<div class="skeleton"></div>';
 s2.innerHTML='<div class="skeleton"></div>';

 let arr=[];

 for(let f of FEEDS){
  let xml=await fetchRSS(f);
  if(!xml) continue;

  let items=xml.querySelectorAll("item");

  for(let i=0;i<5;i++){
   let t=items[i]?.querySelector("title")?.textContent;
   let d=items[i]?.querySelector("pubDate")?.textContent;
   if(t) arr.push({t,d});
  }
 }

 if(arr.length===0){
  hero.innerHTML="Erro ao carregar notícias.";
  return;
 }

 // HERO
 let h=arr[0];
 hero.innerHTML=`
  <div class="hero">
    <h2>${h.t}</h2>
    <div class="text">${textoLongo(h.t)}</div>
  </div>
 `;

 // MAIN
 arr.slice(1,5).forEach(a=>{
  main.innerHTML+=`
   <div class="article">
    <h3>${a.t}</h3>
    <div class="meta">${a.d||""}</div>
    <div class="text">${textoLongo(a.t)}</div>
   </div>
  `;
 });

 // SIDES
 arr.slice(5,8).forEach(a=>{
  s1.innerHTML+=`<div class="article"><h3>${a.t}</h3></div>`;
 });

 arr.slice(8,12).forEach(a=>{
  s2.innerHTML+=`<div class="article"><h3>${a.t}</h3></div>`;
 });
}

load();
</script>

</body>
</html>
