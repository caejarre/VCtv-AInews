<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VCtv AInews V9 REAL</title>

<style>
:root{
--red:#cc0000;
--bg:#0a0a0a;
--card:#111;
--text:#eee;
--muted:#888;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:Georgia,serif;
}

/* SETUP */
#setup{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:15px;
z-index:999;
}

#setup select,#setup button{
padding:10px;
background:#111;
color:#fff;
border:1px solid #333;
}

/* HEADER */
header{
background:#000;
padding:15px;
border-bottom:3px solid var(--red);
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:26px;
font-weight:900;
cursor:pointer;
}
.logo span{color:red}

/* CONTROLES */
.controls{
padding:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}
.controls input{
flex:1;
padding:10px;
background:#111;
border:1px solid #333;
color:#fff;
}
.controls button{
background:var(--red);
border:none;
color:#fff;
padding:10px;
cursor:pointer;
}

/* GRID */
.news{
padding:20px;
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}
@media(max-width:800px){
.news{grid-template-columns:1fr;}
}

/* HERO */
.hero{
background:var(--card);
padding:25px;
border-left:5px solid var(--red);
cursor:pointer;
}
.hero h1{font-size:32px;margin-bottom:10px}

/* SIDE */
.card{
background:var(--card);
padding:15px;
margin-bottom:15px;
cursor:pointer;
}
.card p{color:var(--muted)}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:#000c;
display:none;
justify-content:center;
align-items:center;
}

.box{
background:#111;
padding:25px;
max-width:800px;
max-height:85vh;
overflow:auto;
}

/* FOOTER */
footer{
text-align:center;
color:#555;
padding:20px;
border-top:1px solid #222;
}

/* EASTER */
.matrix{background:black;color:#00ff00;}
.super{filter:contrast(150%)}
</style>
</head>

<body>

<!-- SETUP -->
<div id="setup">
<h2>Configuração inicial</h2>

<select id="vel">
<option value="rapido">⚡ Rápido</option>
<option value="normal" selected>Normal</option>
<option value="detalhado">🧠 Detalhado</option>
</select>

<select id="linhas">
<option value="10">10 linhas</option>
<option value="20" selected>20 linhas</option>
<option value="40">40 linhas</option>
</select>

<button onclick="start()">Entrar</button>
</div>

<header>
<div class="logo" onclick="logoClick()">VCtv <span>AInews</span></div>
<button onclick="reload()">Atualizar</button>
</header>

<div class="controls">
<input id="tema" placeholder="Gerar notícia personalizada (REAL)">
<button onclick="custom()">Gerar</button>
</div>

<div id="news" class="news"></div>

<div id="modal" class="modal" onclick="closeModal()">
<div class="box" id="box"></div>
</div>

<footer>VCtv AInews — Notícias reais + IA responsável</footer>

<script>

let config={vel:"normal",linhas:20};
let noticias=[];
let started=false;

/* START */
function start(){
config.vel=document.getElementById("vel").value;
config.linhas=parseInt(document.getElementById("linhas").value);

document.getElementById("setup").style.display="none";
started=true;
loadNews();
}

/* RELOAD */
function reload(){
if(!started)return;
loadNews();
}

/* RSS REAL */
async function loadNews(){
document.getElementById("news").innerHTML="Carregando notícias reais...";

let feeds=[
"https://g1.globo.com/rss/g1/",
"https://feeds.bbci.co.uk/portuguese/rss.xml"
];

let all=[];

for(let f of feeds){
try{
let r=await fetch("https://api.allorigins.win/get?url="+encodeURIComponent(f));
let d=await r.json();
let xml=new DOMParser().parseFromString(d.contents,"text/xml");

[...xml.querySelectorAll("item")].slice(0,6).forEach(i=>{
all.push({
title:i.querySelector("title").textContent,
desc:i.querySelector("description").textContent,
link:i.querySelector("link").textContent
});
});
}catch{}
}

if(!all.length){
all=[{title:"Erro ao carregar notícias",desc:"Tente atualizar"}];
}

noticias=all;
render();
}

/* RENDER */
function render(){
let hero=noticias[0];
let side=noticias.slice(1,6);

document.getElementById("news").innerHTML=`
<div class="hero" onclick="openNews(0)">
<h1>${hero.title}</h1>
<p>${hero.desc}</p>
</div>

<div>
${side.map((n,i)=>`
<div class="card" onclick="openNews(${i+1})">
<b>${n.title}</b>
<p>${n.desc.substring(0,120)}...</p>
</div>`).join("")}
</div>
`;
}

/* IA SEM FAKE */
async function gerarIA(n){

let linhas=config.linhas;

/* prompt seguro */
function prompt(qtd){
return `
Você é jornalista.

REGRAS:
- NÃO inventar nada
- usar apenas o texto abaixo
- não adicionar fatos
- não criar eventos

Notícia:
${n.title}

${n.desc}

Reescreva com mais detalhes (${qtd} linhas).
`;
}

/* tentativa */
async function tentar(qtd){
for(let i=0;i<3;i++){
try{
let r=await fetch("https://text.pollinations.ai/"+encodeURIComponent(prompt(qtd)));
let txt=await r.text();

if(!txt || txt.length<80) continue;
if(txt.includes("IMPORTANT")) continue;
if(/[一-龯]/.test(txt)) continue;

return txt;

}catch{}
}
return "";
}

/* lógica */
if(linhas<=20){
let p=await tentar(linhas);
if(p) return p;
}

/* dividir */
let p1=await tentar(20);
let p2=await tentar(20);

if(p1 && p2) return p1+"\n\n"+p2;

/* fallback REAL */
return n.desc;
}

/* OPEN */
async function openNews(i){
let n=noticias[i];

document.getElementById("modal").style.display="flex";
document.getElementById("box").innerHTML="Gerando conteúdo...";

let txt=await gerarIA(n);

document.getElementById("box").innerHTML=`
<h2>${n.title}</h2>
<p>${txt}</p>
<br>
<a href="${n.link}" target="_blank">🔗 Fonte original</a>
<br><br>
<button onclick="closeModal()">Fechar</button>
`;
}

/* CUSTOM (SEM FAKE) */
function custom(){
let t=document.getElementById("tema").value;
if(!t)return;

noticias.unshift({
title:t,
desc:"Tema solicitado pelo usuário. Clique para ver explicação baseada em informações gerais.",
link:"#"
});

render();
openNews(0);
}

/* MODAL */
function closeModal(){
document.getElementById("modal").style.display="none";
}

/* EASTER EGGS */
let seq="";
document.addEventListener("keydown",e=>{
seq+=e.key.toLowerCase();

if(seq.includes("vctv")){
alert("Modo secreto VCtv 😎");
seq="";
}

if(e.key==="m"){
document.body.classList.toggle("matrix");
}

if(e.shiftKey && e.key==="V"){
document.body.classList.toggle("super");
}
});

let clicks=0;
function logoClick(){
clicks++;
if(clicks>=7){
document.body.style.filter="hue-rotate(120deg)";
setTimeout(()=>document.body.style.filter="",1000);
clicks=0;
}
}

</script>

</body>
</html>
